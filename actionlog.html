  <style>
    :root {
      --bg:#f5f4f0; --surface:#fff; --border:#e0ddd6; --text:#1a1916;
      --accent:#15803d; --green:#059669; --amber:#d97706; --red:#dc2626;
      --faint:#9c9a94; --muted:#6b6966;
    }
    [data-theme="dark"] {
      --bg:#111110; --surface:#1c1c1a; --border:#2e2d2a; --text:#f0ede8;
      --faint:#6b6966; --muted:#9c9a94;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Toolbar ── */
    #toolbar {
      position:sticky; top:0; z-index:100;
      background:rgba(255,255,255,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:10px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    [data-theme="dark"] #toolbar { background:rgba(28,28,26,0.95); }
    .tb-left  { display:flex; align-items:center; gap:12px; }
    .tb-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .tb-sep   { width:1px; height:22px; background:var(--border); }
    .logo-icon { width:28px; height:28px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-icon svg { width:14px; height:14px; }
    .tool-name { font-size:14px; font-weight:700; letter-spacing:-0.3px; }
    .tool-tag  { font-size:9px; font-weight:600; color:var(--faint); letter-spacing:1px; text-transform:uppercase; }
    .tb-btn {
      font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
      padding:6px 12px; border-radius:7px; border:1.5px solid var(--border);
      background:var(--bg); color:var(--muted); cursor:pointer; white-space:nowrap; transition:all .15s;
    }
    .tb-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--surface); }
    .tb-btn:disabled { opacity:0.35; pointer-events:none; }
    .tb-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
    .tb-btn.primary:hover { opacity:0.9; }

    /* ── Editor ── */
    #editor { max-width:1200px; margin:0 auto; padding:24px 24px 80px; }

    /* Project name bar */
    .proj-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .proj-bar label { font-size:10px; font-weight:700; color:var(--faint); letter-spacing:.8px; text-transform:uppercase; white-space:nowrap; }
    .proj-bar input {
      flex:1; max-width:340px; padding:7px 10px; border:1.5px solid var(--border); border-radius:7px;
      background:var(--surface); color:var(--text); font-size:13px; font-family:inherit;
    }
    .proj-bar input:focus { outline:none; border-color:var(--accent); }

    /* Summary pills */
    .summary-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .s-pill {
      padding:5px 13px; border-radius:20px; font-size:11px; font-weight:700;
      letter-spacing:0.3px; cursor:pointer; transition:opacity .15s; border:1.5px solid transparent;
    }
    .s-pill.active { border-color: currentColor; }
    .s-pill.p-all      { background:#f1f5f9; color:#475569; }
    .s-pill.p-open     { background:#eff6ff; color:#2563eb; }
    .s-pill.p-inprog   { background:#fef3c7; color:#b45309; }
    .s-pill.p-done     { background:#dcfce7; color:#15803d; }
    .s-pill.p-blocked  { background:#fee2e2; color:#dc2626; }
    .s-pill.p-overdue  { background:#fef2f2; color:#dc2626; }

    /* Filter bar */
    .filter-bar { display:flex; gap:8px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
    .filter-bar input, .filter-bar select {
      padding:6px 10px; border:1.5px solid var(--border); border-radius:7px;
      background:var(--surface); color:var(--text); font-size:12px; font-family:inherit;
    }
    .filter-bar input:focus, .filter-bar select:focus { outline:none; border-color:var(--accent); }
    .filter-bar input { width:200px; }

    /* Action table */
    .action-wrap { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
    .action-head, .action-row {
      display:grid;
      grid-template-columns:28px 110px 1fr 110px 100px 95px 105px auto;
      align-items:center; padding:7px 10px; gap:4px;
    }
    .action-head { background:var(--bg); border-bottom:1px solid var(--border); }
    .ah { font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:.8px; }

    .action-row { border-bottom:1px solid var(--border); transition:background .12s; }
    .action-row:last-child { border-bottom:none; }
    .action-row:hover { background:var(--bg); }
    .action-row.is-done { opacity:0.55; }
    .action-row.is-overdue { background:#fff5f5; }
    .action-row.dragging { opacity:0.35; }
    .action-row.drag-over { border-top:2px solid var(--accent); }

    .drag-handle { cursor:grab; color:var(--faint); font-size:14px; padding:2px 4px; user-select:none; }
    .drag-handle:active { cursor:grabbing; }

    .ai { /* action input */
      width:100%; padding:5px 7px; border:1.5px solid transparent; border-radius:6px;
      background:transparent; color:var(--text); font-size:13px; font-family:inherit; transition:border-color .15s;
    }
    .ai:focus { outline:none; border-color:var(--accent); background:var(--surface); }
    .ai.sm { font-size:12px; color:var(--muted); }
    .ai[type="date"] { font-family:'DM Mono',monospace; font-size:12px; }

    .a-sel {
      width:100%; padding:5px 6px; border:1.5px solid var(--border); border-radius:6px;
      background:var(--surface); color:var(--text); font-size:12px; font-family:inherit; cursor:pointer;
    }
    .a-sel:focus { outline:none; border-color:var(--accent); }

    .del-btn { color:var(--faint); background:none; border:none; cursor:pointer; font-size:16px; padding:3px 7px; border-radius:5px; }
    .del-btn:hover { color:var(--red); background:#fef2f2; }

    .action-footer {
      padding:10px 12px; background:var(--bg); border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .add-btn {
      padding:6px 14px; border:1.5px dashed var(--border); border-radius:7px;
      background:none; color:var(--muted); font-size:12px; font-weight:600;
      cursor:pointer; transition:all .15s; font-family:inherit;
    }
    .add-btn:hover { border-color:var(--accent); color:var(--accent); }
    .empty-msg { padding:24px; text-align:center; color:var(--faint); font-size:13px; }

    /* Priority badge */
    .prio { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
    .prio-high { background:#fee2e2; color:#dc2626; }
    .prio-med  { background:#fef3c7; color:#b45309; }
    .prio-low  { background:#f0fdf4; color:#15803d; }

    /* ── Output ── */
    #output { display:none; max-width:1000px; margin:0 auto; padding:28px 24px 80px; }
    .out-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
    .out-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:28px; margin-bottom:20px; }
    .out-hdr { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); gap:12px; }
    .out-title { font-size:20px; font-weight:700; letter-spacing:-.4px; margin-bottom:4px; }
    .out-sub { font-size:12px; color:var(--muted); }
    .out-logo { height:28px; object-fit:contain; display:block; margin-bottom:6px; }
    .out-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .out-sec-title { font-size:11px; font-weight:700; color:var(--faint); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
    .out-table { width:100%; border-collapse:collapse; font-size:12px; }
    .out-table th { padding:7px 8px; text-align:left; font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:.7px; border-bottom:1.5px solid var(--border); }
    .out-table td { padding:8px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
    .out-table tr:last-child td { border-bottom:none; }
    .out-status { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; }
    .st-open    { background:#eff6ff; color:#2563eb; }
    .st-inprog  { background:#fef3c7; color:#b45309; }
    .st-done    { background:#dcfce7; color:#15803d; }
    .st-blocked { background:#fee2e2; color:#dc2626; }
    .out-footer { font-size:10px; color:var(--faint); text-align:center; padding-top:16px; margin-top:16px; border-top:1px solid var(--border); }

    @media print {
      #toolbar, .out-toolbar { display:none !important; }
      body { background:#fff; }
      #output { display:block !important; padding:12px; }
      #editor { display:none !important; }
    }
  
    /* ═══════════════ PYL0N NAV SHELL (auto-applied) ═══════════════ */
    :root { --navy:#1e3a6b; --sidebar-w:272px; }
    body { height:100vh!important; overflow:hidden!important; display:flex!important; flex-direction:column!important; }

    header {
      height:48px; flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; gap:12px;
      background:var(--surface); border-bottom:1px solid var(--border);
      position:relative; z-index:200;
    }
    [data-theme="dark"] header { background:rgba(28,28,26,0.97); }
    .hdr-left  { display:flex; align-items:center; gap:10px; min-width:0; }
    .hdr-right { display:flex; align-items:center; gap:4px; flex-shrink:0; }

    .hdr-logo {
      display:flex; align-items:center; justify-content:center;
      width:28px; height:28px; background:var(--navy); border-radius:7px;
      flex-shrink:0; text-decoration:none; transition:opacity 0.15s;
    }
    .hdr-logo:hover { opacity:0.8; }
    .hdr-logo svg { width:14px; height:14px; }

    .hdr-div { width:1px; height:18px; background:var(--border); flex-shrink:0; }

    .breadcrumb { display:flex; align-items:center; gap:5px; min-width:0; }
    .bc-btn {
      background:none; border:none; padding:0; cursor:pointer;
      font-size:13px; color:var(--muted); font-family:inherit;
      transition:color 0.15s; display:flex; align-items:center; gap:4px;
    }
    .bc-btn:hover { color:var(--text); }
    .bc-btn .bc-caret { font-size:9px; opacity:0.6; transition:transform 0.15s; }
    .bc-btn.open .bc-caret { transform:rotate(180deg); }
    .bc-sep { font-size:11px; color:var(--faint); flex-shrink:0; }
    .bc-current { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; }

    .hdr-icon-btn {
      width:30px; height:30px; border-radius:6px; border:none;
      background:transparent; color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s, color 0.15s; flex-shrink:0;
    }
    .hdr-icon-btn:hover { background:var(--bg); color:var(--text); }
    .hdr-icon-btn svg { width:15px; height:15px; pointer-events:none; }

    /* ── App body ── */
    .app-body { display:flex; flex:1; overflow:hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width:var(--sidebar-w); flex-shrink:0;
      background:var(--surface); border-right:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
      transition:width 0.22s ease;
    }
    .sidebar.collapsed { width:0; }
    .sidebar-inner { width:var(--sidebar-w); overflow-y:auto; flex:1; display:flex; flex-direction:column; }

    .sb-section { padding:18px 16px; border-bottom:1px solid var(--border); }
    .sb-section:last-child { border-bottom:none; }
    .sb-hd {
      font-size:9px; font-weight:700; letter-spacing:1.2px;
      text-transform:uppercase; color:var(--faint); margin-bottom:12px;
    }
    .sb-actions-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .sb-btn {
      font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
      padding:7px 10px; border-radius:7px; border:1.5px solid var(--border);
      background:var(--bg); color:var(--muted); cursor:pointer;
      white-space:nowrap; transition:all 0.15s; text-align:center;
      display:flex; align-items:center; justify-content:center; gap:4px;
    }
    .sb-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--surface); }
    .sb-btn:disabled { opacity:0.35; pointer-events:none; }
    .sb-btn.full  { grid-column:1/-1; }
    .sb-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
    .sb-btn.primary:hover { opacity:0.88; }
    .sb-btn.green { background:var(--green); color:#fff; border-color:var(--green); font-weight:600; }
    .sb-btn.green:hover { opacity:0.88; }
    .sb-btn.accent { background:none; color:var(--accent); border-color:var(--accent); font-weight:600; }
    .sb-btn.accent:hover { background:var(--accent); color:#fff; }

    /* ── Canvas ── */
    .canvas { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; }
    .canvas-body { flex:1; overflow-y:auto; }

    /* ── Nav popover ── */
    .nav-popover {
      position:fixed; top:49px; left:0; width:492px;
      background:var(--surface); border:1px solid var(--border);
      border-top:none; border-radius:0 0 14px 14px;
      box-shadow:0 12px 36px rgba(0,0,0,0.13);
      z-index:400; padding:14px;
      animation:navPopIn 0.16s ease;
    }
    @keyframes navPopIn {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .nav-pop-hd {
      display:flex; align-items:center; justify-content:space-between;
      padding-bottom:10px; margin-bottom:10px; border-bottom:1px solid var(--border);
    }
    .nav-pop-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.1px; color:var(--faint); }
    .nav-pop-dash  { font-size:12px; font-weight:600; color:var(--accent); text-decoration:none; }
    .nav-pop-dash:hover { text-decoration:underline; }
    .nav-pop-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
    .nav-tool-card {
      display:flex; align-items:center; gap:9px;
      padding:8px 9px; border-radius:8px;
      text-decoration:none; color:var(--text); transition:background 0.12s;
    }
    .nav-tool-card:hover { background:var(--bg); }
    .nav-tool-card.ntc-active { background:var(--bg); outline:1.5px solid var(--border); }
    .ntc-icon {
      width:28px; height:28px; border-radius:7px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:700; color:#fff; letter-spacing:-0.3px;
      font-family:'DM Mono',monospace;
    }
    .ntc-info { min-width:0; }
    .ntc-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ntc-tag  { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

    /* ── Hide old toolbar chrome ── */
    .kb-hint, #autosave-label, .save-confirm { display:none !important; }
    #toolbar { display:none !important; }


    .sb-field { margin-bottom:10px; }
    .sb-field:last-child { margin-bottom:0; }
    .sb-field label {
      display:block; font-size:10px; font-weight:600; color:var(--faint);
      letter-spacing:0.8px; text-transform:uppercase; margin-bottom:4px;
    }
    .sb-field input, .sb-field select, .sb-field textarea {
      width:100%; padding:7px 9px; border:1.5px solid var(--border); border-radius:7px;
      background:var(--bg); color:var(--text); font-size:13px;
      font-family:inherit; transition:border-color 0.15s;
    }
    .sb-field input:focus, .sb-field select:focus, .sb-field textarea:focus {
      outline:none; border-color:var(--accent); background:var(--surface);
    }
    .sb-field select { cursor:pointer; }

    /* ── Print ── */
    @media print {
      header, .sidebar, .nav-popover { display:none !important; }
      body { height:auto!important; overflow:visible!important; display:block!important; }
      .app-body, .canvas, .canvas-body { display:block!important; overflow:visible!important; height:auto!important; }
    }

  </style>
</head>

<script>

const STATE_KEY = 'bidcast_state_actionlog';
let _nextId = 100;

/* ══ Undo / Redo (backed by vendor/pyl0n-state.js) ════════════════════ */
const _undoStack = PylonState.createUndoStack({
  collect: collectState, apply: applyState, max: 60, debounceMs: 500,
  onChange: () => {
    const u = document.getElementById('btn-undo');
    const r = document.getElementById('btn-redo');
    if (u) u.disabled = !_undoStack.canUndo;
    if (r) r.disabled = !_undoStack.canRedo;
    PylonState.safeWriteLS(STATE_KEY, collectState());
  },
});
function _snapshot()     { _undoStack.snapshot(); }
function _scheduleSnap() { _undoStack.scheduleSnap(); }
function undo()          { _undoStack.undo(); }
function redo()          { _undoStack.redo(); }

/* ══ State ════════════════════════════════════════════════════════════ */
function collectState(){
  return { projName: document.getElementById('proj-name')?.value||'', actions: _getActions() };
}
function applyState(s){
  if(!s)return;
  document.getElementById('proj-name').value=s.projName||'';
  document.getElementById('action-body').innerHTML='';
  (s.actions||[]).forEach(a=>addAction(a));
  _refreshSummary();
}
function _getActions(){
  return Array.from(document.querySelectorAll('#action-body .action-row')).map(row=>({
    id:      +row.dataset.id||0,
    category:row.querySelector('.a-cat')?.value   ||'',
    desc:    row.querySelector('.a-desc')?.value  ||'',
    owner:   row.querySelector('.a-owner')?.value ||'',
    due:     row.querySelector('.a-due')?.value   ||'',
    priority:row.querySelector('.a-prio')?.value  ||'Medium',
    status:  row.querySelector('.a-status')?.value||'Open',
    notes:   row.querySelector('.a-notes')?.value ||'',
  }));
}

/* ══ Add / remove actions ═════════════════════════════════════════════ */
function addAction(data){
  const id  = data?.id  || (_nextId++);
  const cat = data?.category || '';
  const desc= data?.desc     || '';
  const own = data?.owner    || '';
  const due = data?.due      || '';
  const pri = data?.priority || 'Medium';
  const sts = data?.status   || 'Open';
  const nt  = data?.notes    || '';

  const row=document.createElement('div');
  row.className='action-row';
  row.dataset.id=id;
  row.draggable=true;
  row.innerHTML=
    `<span class="drag-handle" title="Drag to reorder">⠿</span>`+
    `<select class="a-sel a-cat sm" onchange="_onRowChange(this)">`+
      ['','Planning','Commercial','Technical','Risk','Legal','Admin','Other']
        .map(v=>`<option${v===cat?' selected':''}>${v}</option>`).join('')+
    `</select>`+
    `<input class="ai a-desc" type="text" value="${esc(desc)}" placeholder="Describe the action…" oninput="_scheduleSnap()">`+
    `<input class="ai a-owner sm" type="text" value="${esc(own)}" placeholder="Owner" oninput="_scheduleSnap()">`+
    `<input class="ai a-due" type="date" value="${esc(due)}" oninput="_onRowChange(this)">`+
    `<select class="a-sel a-prio" onchange="_onRowChange(this)">`+
      ['High','Medium','Low'].map(v=>`<option${v===pri?' selected':''}>${v}</option>`).join('')+
    `</select>`+
    `<select class="a-sel a-status" onchange="_onRowChange(this)">`+
      ['Open','In Progress','Done','Blocked'].map(v=>`<option${v===sts?' selected':''}>${v}</option>`).join('')+
    `</select>`+
    `<div style="display:flex;align-items:center;gap:2px;">`+
      `<input class="ai a-notes sm" type="text" value="${esc(nt)}" placeholder="Notes…" oninput="_scheduleSnap()" style="min-width:70px">`+
      `<button class="del-btn" onclick="removeAction(this)" title="Delete">×</button>`+
    `</div>`;

  _initDrag(row);
  document.getElementById('action-body').appendChild(row);
  _updateRowStyle(row);
  _refreshSummary();
}

function removeAction(btn){
  btn.closest('.action-row').remove();
  _snapshot(); _refreshSummary();
}

function _onRowChange(el){
  _updateRowStyle(el.closest('.action-row'));
  _scheduleSnap(); _refreshSummary();
}

function _updateRowStyle(row){
  const sts = row.querySelector('.a-status')?.value||'';
  const due = row.querySelector('.a-due')?.value||'';
  const today=new Date(); today.setHours(0,0,0,0);
  const isOverdue = due && new Date(due)<today && sts!=='Done';
  row.classList.toggle('is-done',    sts==='Done');
  row.classList.toggle('is-overdue', isOverdue);
}

/* ══ Drag and drop ════════════════════════════════════════════════════ */
let _dragSrc=null;
function _initDrag(row){
  row.addEventListener('dragstart',e=>{_dragSrc=row;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  row.addEventListener('dragend',()=>{_dragSrc=null;document.querySelectorAll('.action-row').forEach(r=>r.classList.remove('dragging','drag-over'));});
  row.addEventListener('dragover',e=>{e.preventDefault();if(_dragSrc&&_dragSrc!==row)row.classList.add('drag-over');});
  row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
  row.addEventListener('drop',e=>{e.preventDefault();row.classList.remove('drag-over');if(_dragSrc&&_dragSrc!==row){row.before(_dragSrc);_snapshot();}});
}

/* ══ Summary pills ════════════════════════════════════════════════════ */
let _activeFilter='';
function _refreshSummary(){
  const actions=_getActions();
  const today=new Date(); today.setHours(0,0,0,0);
  let open=0,inprog=0,done=0,blocked=0,overdue=0;
  actions.forEach(a=>{
    if(a.status==='Open')        open++;
    else if(a.status==='In Progress') inprog++;
    else if(a.status==='Done')   done++;
    else if(a.status==='Blocked')blocked++;
    if(a.status!=='Done'&&a.due&&new Date(a.due)<today) overdue++;
  });
  const total=actions.length;
  const bar=document.getElementById('summary-bar');
  if(!bar)return;
  bar.innerHTML=[
    {k:'',    cls:'p-all',    label:`All (${total})`},
    {k:'Open',cls:'p-open',   label:`Open (${open})`},
    {k:'In Progress',cls:'p-inprog',label:`In Progress (${inprog})`},
    {k:'Done',cls:'p-done',   label:`Done (${done})`},
    {k:'Blocked',cls:'p-blocked',label:`Blocked (${blocked})`},
    ...(overdue>0?[{k:'overdue',cls:'p-overdue',label:`⚠ Overdue (${overdue})`}]:[]),
  ].map(p=>`<span class="s-pill ${p.cls}${_activeFilter===p.k?' active':''}"
    onclick="_filterPill('${p.k}')">${p.label}</span>`).join('');

  const cnt=document.getElementById('row-count');
  if(cnt) cnt.textContent=`${total} action${total!==1?'s':''}`;
  _applyFilters();
}

function _filterPill(key){
  _activeFilter=key;
  if(key!=='overdue'){
    const sf=document.getElementById('filter-status');
    if(sf) sf.value=key;
  }
  _refreshSummary();
}

function _applyFilters(){
  const search=(document.getElementById('search-box')?.value||'').toLowerCase();
  const fSts  =document.getElementById('filter-status')?.value||'';
  const fPrio =document.getElementById('filter-prio')?.value||'';
  const fCat  =document.getElementById('filter-cat')?.value||'';
  const today =new Date(); today.setHours(0,0,0,0);

  document.querySelectorAll('#action-body .action-row').forEach(row=>{
    const desc =row.querySelector('.a-desc')?.value.toLowerCase()||'';
    const owner=row.querySelector('.a-owner')?.value.toLowerCase()||'';
    const sts  =row.querySelector('.a-status')?.value||'';
    const prio =row.querySelector('.a-prio')?.value||'';
    const cat  =row.querySelector('.a-cat')?.value||'';
    const due  =row.querySelector('.a-due')?.value||'';
    const isOverdue=due&&new Date(due)<today&&sts!=='Done';

    const matchSearch=!search||(desc.includes(search)||owner.includes(search));
    const matchSts   =!fSts  ||(_activeFilter==='overdue'?isOverdue:sts===fSts);
    const matchPrio  =!fPrio ||prio===fPrio;
    const matchCat   =!fCat  ||cat===fCat;

    row.style.display=(matchSearch&&matchSts&&matchPrio&&matchCat)?'':'none';
  });
}

/* ══ Generate output ══════════════════════════════════════════════════ */
function generate(){
  const s       = collectState();
  const today   = new Date(); today.setHours(0,0,0,0);
  const logo    = SuiteManager.getLogo();
  const dateStr = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

  // Counts
  let open=0,inprog=0,done=0,blocked=0,overdue=0;
  s.actions.forEach(a=>{
    if(a.status==='Open')         open++;
    else if(a.status==='In Progress') inprog++;
    else if(a.status==='Done')    done++;
    else if(a.status==='Blocked') blocked++;
    if(a.status!=='Done'&&a.due&&new Date(a.due)<today) overdue++;
  });

  function stClass(st){ return st==='Open'?'st-open':st==='In Progress'?'st-inprog':st==='Done'?'st-done':'st-blocked'; }
  function prioColor(p){ return p==='High'?'#dc2626':p==='Low'?'#15803d':'#b45309'; }

  // Sort: Blocked → Open → In Progress → Done, then by due date
  const ORDER = {'Blocked':0,'Open':1,'In Progress':2,'Done':3};
  const sorted = [...s.actions].sort((a,b)=>{
    const od = (ORDER[a.status]||0)-(ORDER[b.status]||0);
    if(od!==0) return od;
    if(a.due&&b.due) return a.due.localeCompare(b.due);
    return a.due?-1:b.due?1:0;
  });

  const rows = sorted.map((a,i)=>{
    const isOverdue = a.status!=='Done'&&a.due&&new Date(a.due)<today;
    const dueFmt = a.due ? new Date(a.due+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    return `<tr${isOverdue?' style="background:#fff5f5"':''}>
      <td>${i+1}</td>
      <td style="color:var(--muted);font-size:11px">${esc(a.category)}</td>
      <td>${esc(a.desc)}${a.notes?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(a.notes)}</div>`:''}</td>
      <td>${esc(a.owner)}</td>
      <td style="white-space:nowrap${isOverdue?';color:#dc2626;font-weight:600':''}">${dueFmt}${isOverdue?' ⚠':''}</td>
      <td><span style="font-size:10px;font-weight:700;color:${prioColor(a.priority)}">${a.priority}</span></td>
      <td><span class="out-status ${stClass(a.status)}">${a.status}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('output').innerHTML=`
    <div class="out-toolbar">
      <button class="tb-btn" onclick="goBack()">← Editor</button>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="tb-btn" onclick="exportPDF()">PDF</button>
        <button class="tb-btn" onclick="exportExcel()">Excel</button>
        <button class="tb-btn" onclick="exportHTML()">HTML</button>
      </div>
    </div>
    <div class="out-card" id="out-printable">
      <div class="out-hdr">
        <div>
          ${logo?`<img class="out-logo" src="${logo}">`:''}
          <div class="out-title">${esc(s.projName||'Action Log')}</div>
          <div class="out-sub">Generated ${dateStr} &nbsp;·&nbsp; ${s.actions.length} action${s.actions.length!==1?'s':''}</div>
        </div>
        <div class="out-pills">
          ${open>0    ?`<span class="out-status st-open">Open: ${open}</span>`:''}
          ${inprog>0  ?`<span class="out-status st-inprog">In Progress: ${inprog}</span>`:''}
          ${blocked>0 ?`<span class="out-status st-blocked">Blocked: ${blocked}</span>`:''}
          ${overdue>0 ?`<span class="out-status st-blocked">⚠ Overdue: ${overdue}</span>`:''}
          ${done>0    ?`<span class="out-status st-done">Done: ${done}</span>`:''}
        </div>
      </div>
      ${s.actions.length===0
        ? `<div style="text-align:center;padding:32px;color:var(--faint)">No actions logged yet.</div>`
        : `<table class="out-table">
            <thead><tr>
              <th>#</th><th>Category</th><th>Action</th>
              <th>Owner</th><th>Due</th><th>Priority</th><th>Status</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>`}
      <div class="out-footer">Generated with ActionLog · PYL0N Suite</div>
    </div>`;

  document.getElementById('editor').style.display='none';
  document.getElementById('output').style.display='block';
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('editor').style.display='block';
  document.getElementById('output').style.display='none';
}

/* ══ Exports ══════════════════════════════════════════════════════════ */
async function exportPDF(){
  generate();
  const el   = document.getElementById('out-printable');
  const name = (document.getElementById('proj-name')?.value||'actionlog').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSavePDF(el,`ActionLog_${name}.pdf`,{
    margin:10,image:{type:'jpeg',quality:0.97},
    html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}
  });
}

async function exportExcel(){
  const s  = collectState();
  const wb = XLSX.utils.book_new();
  const today = new Date(); today.setHours(0,0,0,0);
  const rows = [
    ['ActionLog — Bid Action Tracker'],
    ['Project:', s.projName],
    ['Exported:', new Date().toLocaleDateString('en-GB')],
    [],
    ['#','Category','Action','Owner','Due Date','Priority','Status','Overdue?','Notes'],
  ];
  s.actions.forEach((a,i)=>{
    const isOverdue = a.status!=='Done'&&a.due&&new Date(a.due)<today;
    rows.push([i+1, a.category, a.desc, a.owner, a.due||'', a.priority, a.status, isOverdue?'Yes':'', a.notes]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:13},{wch:46},{wch:16},{wch:12},{wch:10},{wch:13},{wch:10},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'ActionLog');
  const name=(s.projName||'actionlog').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSaveXLSX(wb,`ActionLog_${name}.xlsx`);
}

async function exportHTML(){
  const s       = collectState();
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(s))));
  const injected = document.documentElement.outerHTML.replace('</body>',
    `<script>try{applyState(JSON.parse(decodeURIComponent(escape(atob("${encoded}")))))}catch(e){}<\/script></body>`);
  const name=(s.projName||'actionlog').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSaveHTML(`ActionLog_${name}.html`,injected);
}

async function saveJSON(){
  const s=collectState();
  try{localStorage.setItem(STATE_KEY,JSON.stringify(s));}catch{}
  const name=(s.projName||'actionlog').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSaveText(`actionlog_${name}.json`,JSON.stringify(s,null,2),'JSON Files','.json');
}
async function loadJSON(input){
  const file=input.files[0]; if(!file)return;
  try{applyState(JSON.parse(await file.text()));_snapshot();}catch{alert('Invalid JSON file');}
  input.value='';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Dark mode ── */
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('bidcast_theme', newTheme);
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = newTheme === 'dark' ? '☀' : '🌙';
  try {
    const sync = JSON.parse(localStorage.getItem('bidcast_suite_sync') || '{}');
    sync.theme = newTheme; sync._ts = Date.now();
    localStorage.setItem('bidcast_suite_sync', JSON.stringify(sync));
  } catch(e) {}
}
function _applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme || 'light');
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
}

function _suiteWrite(){
  const n=document.getElementById('proj-name')?.value||'';
  if(n)SuiteManager.write({projectName:n},'actionlog');
}

/* ══ Init ═════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  SuiteManager.migrate();
  _applyTheme(localStorage.getItem('bidcast_theme') || 'light');
  const saved=localStorage.getItem(STATE_KEY);
  if(saved){ try{applyState(JSON.parse(saved));}catch{} }
  else{
    const sync=SuiteManager.read();
    if(sync.projectName) document.getElementById('proj-name').value=sync.projectName;
  }
  _snapshot();
  SuiteManager.onUpdate(sync=>{
    const el=document.getElementById('proj-name');
    if(el&&document.activeElement!==el&&sync.projectName) el.value=sync.projectName;
  });
  document.addEventListener('keydown',e=>{
    if(e.ctrlKey||e.metaKey){
      if(e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
      if(e.key==='y'||(e.key==='z'&&e.shiftKey)){e.preventDefault();redo();}
      if(e.key==='s'){e.preventDefault();saveJSON();}
    }
  });
});

let _navOpen = false;
function _buildNavPopover() {
  const grid = document.getElementById('nav-pop-grid');
  if (!grid || grid.children.length) return;
  const current = location.pathname.split('/').pop() || 'index.html';
  grid.innerHTML = SUITE_TOOLS.map(t => {
    const active = t.file === current ? ' ntc-active' : '';
    return `<a class="nav-tool-card${active}" href="${t.file}">
      <div class="ntc-icon" style="background:${t.color}">${t.abbr}</div>
      <div class="ntc-info"><div class="ntc-name">${t.name}</div><div class="ntc-tag">${t.tag}</div></div>
    </a>`;
  }).join('');
}
function toggleNavPopover(e) { e && e.stopPropagation(); _navOpen ? closeNavPopover() : openNavPopover(); }
function openNavPopover() {
  _buildNavPopover();
  document.getElementById('nav-popover').style.display = 'block';
  document.getElementById('dashboard-btn').classList.add('open');
  _navOpen = true;
}
function closeNavPopover() {
  document.getElementById('nav-popover').style.display = 'none';
  document.getElementById('dashboard-btn').classList.remove('open');
  _navOpen = false;
}
function toggleSidebar() {
  const sb  = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle-btn');
  const collapsed = sb.classList.toggle('collapsed');
  btn.style.opacity = collapsed ? '0.45' : '1';
}
