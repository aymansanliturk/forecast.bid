<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BidPack · PYL0N</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="libs/xlsx.full.min.js"></script>
  <script src="libs/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="libs/fonts.css">
  <script src="vendor/pyl0n-native.js"></script>
  <style>
    :root {
      --bg:#f5f4f0; --surface:#fff; --border:#e0ddd6; --text:#1a1916;
      --accent:#1e40af; --green:#059669; --amber:#d97706; --red:#dc2626;
      --faint:#9c9a94; --muted:#6b6966;
    }
    [data-theme="dark"] {
      --bg:#111110; --surface:#1c1c1a; --border:#2e2d2a; --text:#f0ede8;
      --faint:#6b6966; --muted:#9c9a94;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Toolbar ── */
    #toolbar {
      position:sticky; top:0; z-index:100;
      background:rgba(255,255,255,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:10px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    [data-theme="dark"] #toolbar { background:rgba(28,28,26,0.95); }
    .tb-left  { display:flex; align-items:center; gap:12px; }
    .tb-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .tb-sep   { width:1px; height:22px; background:var(--border); }
    .logo-icon { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-icon svg { width:14px; height:14px; }
    .tool-name { font-size:14px; font-weight:700; letter-spacing:-0.3px; }
    .tool-tag  { font-size:9px; font-weight:600; color:var(--faint); letter-spacing:1px; text-transform:uppercase; }
    .tb-btn {
      font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
      padding:6px 12px; border-radius:7px; border:1.5px solid var(--border);
      background:var(--bg); color:var(--muted); cursor:pointer; white-space:nowrap; transition:all .15s;
    }
    .tb-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--surface); }
    .tb-btn:disabled { opacity:0.35; pointer-events:none; }
    .tb-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
    .tb-btn.primary:hover { opacity:0.9; }

    /* ── Editor ── */
    #editor { max-width:900px; margin:0 auto; padding:28px 24px 80px; }
    .sec-title { font-size:11px; font-weight:700; color:var(--faint); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; margin-top:28px; }
    .sec-title:first-child { margin-top:0; }

    .meta-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:8px; }
    @media(max-width:700px) { .meta-grid { grid-template-columns:1fr 1fr; } }
    .meta-field label { display:block; font-size:10px; font-weight:600; color:var(--faint); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:4px; }
    .meta-field input, .meta-field select {
      width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:7px;
      background:var(--surface); color:var(--text); font-size:13px; font-family:inherit; transition:border-color 0.15s;
    }
    .meta-field input:focus, .meta-field select:focus { outline:none; border-color:var(--accent); }

    /* ── Section list ── */
    .sec-list-wrap { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:16px; }
    .sec-list-hint { font-size:11px; color:var(--muted); padding:9px 14px; background:var(--bg); border-bottom:1px solid var(--border); }
    .sec-item {
      display:grid; grid-template-columns:24px 22px 1fr auto;
      align-items:center; gap:10px; padding:10px 12px;
      border-bottom:1px solid var(--border); transition:background 0.12s;
    }
    .sec-item:last-child { border-bottom:none; }
    .sec-item:hover { background:var(--bg); }
    .sec-item.dragging { opacity:0.35; }
    .sec-item.drag-over { border-top:2px solid var(--accent); }
    .sec-item.sec-disabled .sec-item-info { opacity:0.45; }
    .drag-handle { cursor:grab; color:var(--faint); font-size:14px; text-align:center; user-select:none; }
    .drag-handle:active { cursor:grabbing; }
    .sec-cb { cursor:pointer; accent-color:var(--accent); width:15px; height:15px; }
    .sec-item-info { display:flex; flex-direction:column; gap:2px; min-width:0; }
    .sec-title-txt { font-size:13px; font-weight:600; }
    .sec-desc-txt  { font-size:11px; color:var(--muted); }
    .sec-badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; white-space:nowrap; }
    .sb-ok    { background:#dcfce7; color:#166534; }
    .sb-empty { background:#fef9c3; color:#92400e; }
    [data-theme="dark"] .sb-ok    { background:#14532d; color:#86efac; }
    [data-theme="dark"] .sb-empty { background:#451a03; color:#fde68a; }

    .assemble-row { display:flex; justify-content:flex-end; padding:4px 0 8px; }
    .hint-text { font-size:12px; color:var(--muted); margin-bottom:14px; line-height:1.5; }

    /* ── Output toolbar ── */
    #output-toolbar {
      position:sticky; top:0; z-index:50;
      display:flex; align-items:center; gap:8px; padding:10px 24px;
      background:var(--surface); border-bottom:1px solid var(--border);
      box-shadow:0 1px 4px rgba(0,0,0,.06);
    }

    /* ── Document output ── */
    #doc-wrap { background:#e8e6e0; padding:24px; min-height:100vh; }
    .doc-page {
      background:#fff; max-width:794px; margin:0 auto 28px;
      min-height:1123px; padding:40px 48px; position:relative;
      box-shadow:0 4px 24px rgba(0,0,0,0.12);
      font-family:'DM Sans',system-ui,sans-serif; font-size:13px;
    }

    /* Cover */
    .doc-cover { display:flex; flex-direction:column; align-items:center; justify-content:space-between; text-align:center; }
    .cover-top { display:flex; flex-direction:column; align-items:center; gap:16px; width:100%; padding-bottom:24px; }
    .cover-logo { max-height:60px; max-width:220px; object-fit:contain; }
    .cover-conf { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; padding:3px 12px; border:1.5px solid #be123c; color:#be123c; border-radius:3px; display:inline-block; }
    .cover-mid { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; width:100%; }
    .cover-rule { width:64px; height:3px; background:#1e40af; border-radius:2px; margin:20px 0; }
    .cover-title { font-size:34px; font-weight:700; color:#111; line-height:1.15; }
    .cover-customer { font-size:16px; color:#6b6966; margin-top:8px; }
    .cover-bottom { width:100%; padding-top:24px; font-size:12px; color:#9ca3af; line-height:2; }
    .cover-bottom strong { color:#4b5563; }

    /* TOC */
    .toc-entry { display:flex; align-items:baseline; gap:6px; padding:8px 0; border-bottom:1px dotted #e5e7eb; }
    .toc-num  { font-size:12px; color:#9ca3af; width:24px; flex-shrink:0; font-family:'DM Mono',monospace; }
    .toc-name { font-size:13px; font-weight:600; color:#1a1916; flex:1; }
    .toc-src  { font-size:11px; color:#9ca3af; font-style:italic; }

    /* Section page */
    .doc-page-hd {
      display:flex; align-items:flex-start; justify-content:space-between;
      border-bottom:2.5px solid #1e40af; padding-bottom:14px; margin-bottom:24px;
    }
    .doc-pg-num   { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#9ca3af; margin-bottom:2px; }
    .doc-pg-title { font-size:22px; font-weight:700; color:#111; line-height:1.2; }
    .doc-pg-sub   { font-size:12px; color:#6b6966; margin-top:3px; }
    .doc-page-ft  {
      position:absolute; bottom:24px; left:48px; right:48px;
      display:flex; justify-content:space-between; font-size:10px; color:#9ca3af;
      border-top:1px solid #e5e7eb; padding-top:6px;
    }

    /* Data tables */
    .dt { width:100%; border-collapse:collapse; font-size:11.5px; margin-top:8px; }
    .dt th { background:#f8fafc; text-align:left; padding:7px 10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#6b6966; border-bottom:1.5px solid #e2e8f0; white-space:nowrap; }
    .dt td { padding:7px 10px; border-bottom:1px solid #f1f5f9; vertical-align:top; line-height:1.4; }
    .dt tr:last-child td { border-bottom:none; }
    .dt tr:hover td { background:#f8fafc; }
    .dt .total-row td { font-weight:700; background:#f0f9ff; border-top:1.5px solid #bae6fd; border-bottom:none; }
    .dt .r    { text-align:right; }
    .dt .mono { font-family:'DM Mono',monospace; }

    /* BidScore gauge */
    .score-gauge-wrap { display:flex; align-items:center; gap:28px; margin-bottom:20px; }
    .score-gauge-svg  { width:160px; height:96px; flex-shrink:0; }

    /* Verdict / badge chips */
    .verdict-chip { display:inline-block; padding:5px 14px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
    .v-bid  { background:#dcfce7; color:#14532d; }
    .v-cond { background:#fef9c3; color:#713f12; }
    .v-no   { background:#fee2e2; color:#7f1d1d; }

    /* Risk badges */
    .rb { display:inline-block; font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; white-space:nowrap; }
    .rb-crit { background:#fee2e2; color:#7f1d1d; }
    .rb-high { background:#ffedd5; color:#7c2d12; }
    .rb-med  { background:#fef9c3; color:#713f12; }
    .rb-low  { background:#dcfce7; color:#14532d; }
    .rb-gain { background:#dcfce7; color:#14532d; }

    /* Status / priority pills */
    .sp { display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:10px; white-space:nowrap; }
    .sp-open  { background:#f0f9ff; color:#075985; }
    .sp-prog  { background:#f0fdf4; color:#14532d; }
    .sp-done  { background:#f9fafb; color:#6b7280; }
    .sp-block { background:#fff1f2; color:#881337; }
    .sp-high  { background:#fee2e2; color:#7f1d1d; }
    .sp-med   { background:#fef9c3; color:#713f12; }
    .sp-low   { background:#f0fdf4; color:#14532d; }

    /* Misc */
    .tb-ms { display:inline-block; font-size:9px; font-weight:700; background:#eff6ff; color:#1d4ed8; padding:1px 5px; border-radius:3px; margin-right:4px; }
    .no-data-box { text-align:center; color:#9ca3af; padding:40px 0; font-size:13px; }
    .cat-row td { background:#f8fafc; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#6b6966; }

    /* Print */
    @media print {
      #toolbar, #output-toolbar { display:none !important; }
      #doc-wrap { background:transparent; padding:0; }
      .doc-page { box-shadow:none; margin:0; padding:20mm 18mm; max-width:none; min-height:auto; page-break-after:always; }
      .doc-page:last-child { page-break-after:avoid; }
      @page { size:A4 portrait; margin:0; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="tb-left">
    <div class="logo-icon" style="background:#1e40af">
      <svg viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 2h7l4 4v11a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/>
        <path d="M11 2v4h4"/>
        <line x1="5" y1="9"  x2="12" y2="9"/>
        <line x1="5" y1="12" x2="9"  y2="12"/>
      </svg>
    </div>
    <div>
      <div class="tool-name">BidPack</div>
      <div class="tool-tag">Bid Document Assembler</div>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="location.href='index.html'">← Dashboard</button>
  </div>
  <div class="tb-right">
    <button class="tb-btn" id="btn-undo" onclick="undo()" disabled>↩ Undo</button>
    <button class="tb-btn" id="btn-redo" onclick="redo()" disabled>↪ Redo</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="saveJSON()">Save</button>
    <label class="tb-btn" style="cursor:pointer">Load<input type="file" accept=".json" onchange="loadJSON(this)" style="display:none"></label>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="exportHTML()">HTML</button>
    <button class="tb-btn" onclick="exportPDF()">PDF</button>
    <button class="tb-btn primary" onclick="generate()">Assemble ›</button>
  </div>
</div>

<div id="editor">
  <div class="sec-title">Document Details</div>
  <div class="meta-grid">
    <div class="meta-field">
      <label>Project Name</label>
      <input type="text" id="proj-name" placeholder="e.g. Offshore Wind Farm EPC" oninput="_scheduleSnap()">
    </div>
    <div class="meta-field">
      <label>Customer</label>
      <input type="text" id="customer" placeholder="e.g. Acme Energy Ltd" oninput="_scheduleSnap()">
    </div>
    <div class="meta-field">
      <label>Revision</label>
      <input type="text" id="revision" value="Rev A" oninput="_scheduleSnap()">
    </div>
    <div class="meta-field">
      <label>Date</label>
      <input type="date" id="doc-date" oninput="_scheduleSnap()">
    </div>
    <div class="meta-field">
      <label>Prepared By</label>
      <input type="text" id="prepared-by" placeholder="Name or Department" oninput="_scheduleSnap()">
    </div>
    <div class="meta-field">
      <label>Confidentiality</label>
      <select id="confidentiality" onchange="_scheduleSnap()">
        <option value="">None</option>
        <option value="Confidential">Confidential</option>
        <option value="Strictly Confidential">Strictly Confidential</option>
        <option value="Commercial in Confidence">Commercial in Confidence</option>
        <option value="Internal Use Only">Internal Use Only</option>
      </select>
    </div>
  </div>

  <div class="sec-title">Document Sections</div>
  <p class="hint-text">Toggle sections on/off and drag to reorder. Each section pulls live data from its source tool.</p>
  <div class="sec-list-wrap">
    <div class="sec-list-hint">↕ Drag to reorder &nbsp;·&nbsp; ☑ Toggle to include/exclude</div>
    <div id="section-list"></div>
  </div>
  <div class="assemble-row">
    <button class="tb-btn primary" style="font-size:13px;padding:10px 24px;" onclick="generate()">Assemble Document ›</button>
  </div>
</div>

<div id="output" style="display:none">
  <div id="output-toolbar">
    <button class="tb-btn" onclick="goBack()">← Edit</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="exportPDF()">PDF</button>
    <button class="tb-btn" onclick="exportHTML()">HTML</button>
  </div>
  <div id="doc-wrap"></div>
</div>

<script>
/* ══ SuiteManager ═════════════════════════════════════════════════════ */
const SuiteManager = (() => {
  const SK = 'bidcast_suite_sync', LK = 'bidcast_logo';
  function read()  { try { return JSON.parse(localStorage.getItem(SK)||'{}'); } catch { return {}; } }
  function write(p){ try { localStorage.setItem(SK, JSON.stringify({...read(),...p,_ts:Date.now()})); } catch {} }
  function getLogo(){ return localStorage.getItem(LK)||null; }
  function onUpdate(cb){ window.addEventListener('storage', e => { if(e.key===SK||e.key===LK) cb(read(),e.key); }); }
  function migrate(){
    const mv=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k?.startsWith('pyl0n_')) mv.push(k); }
    mv.forEach(k=>{ const nk='bidcast_'+k.slice(6); if(!localStorage.getItem(nk)) localStorage.setItem(nk,localStorage.getItem(k)); localStorage.removeItem(k); });
  }
  return { read, write, getLogo, onUpdate, migrate };
})();

/* ══ Constants ════════════════════════════════════════════════════════ */
const STATE_KEY = 'bidcast_state_bidpack';
const _MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const SECTIONS = [
  { id:'bidscore',   title:'Executive Summary',    desc:'Bid score, verdict and decision criteria',         key:'bidcast_state_bidscore'      },
  { id:'timeline',   title:'Project Timeline',     desc:'Milestones and tasks from TimeCast',              key:'bidcast_state_timecast'      },
  { id:'commercial', title:'Commercial Breakdown', desc:'Direct cost items and categories from CalcCast',  key:'bidcast_state_calccast'      },
  { id:'resources',  title:'Resource Plan',        desc:'Roles, hours and budget from ResourceCast',       key:'bidcast_state_resourcecast'  },
  { id:'risks',      title:'Risk Register',        desc:'Risks and opportunities from RiskCast',           key:'bidcast_state_riskcast'      },
  { id:'suppliers',  title:'Supplier Quotes',      desc:'RFQ status and received quotes from RFQCast',     key:'bidcast_state_rfqcast'       },
  { id:'actions',    title:'Action Items',         desc:'Open and in-progress actions from ActionLog',     key:'bidcast_state_actionlog'     },
];

/* ══ Undo / Redo ══════════════════════════════════════════════════════ */
let _hist = [], _hIdx = -1, _snapTimer = null;

function _snapshot() {
  const s = JSON.stringify(collectState());
  if (_hist[_hIdx] === s) return;
  _hist = _hist.slice(0, _hIdx + 1);
  _hist.push(s); if (_hist.length > 60) _hist.shift();
  _hIdx = _hist.length - 1;
  _syncUndoUI();
  localStorage.setItem(STATE_KEY, s);
}
function _scheduleSnap() { clearTimeout(_snapTimer); _snapTimer = setTimeout(_snapshot, 600); }
function undo() { if (_hIdx > 0)              { _hIdx--; applyState(JSON.parse(_hist[_hIdx])); _syncUndoUI(); } }
function redo() { if (_hIdx < _hist.length-1) { _hIdx++; applyState(JSON.parse(_hist[_hIdx])); _syncUndoUI(); } }
function _syncUndoUI() {
  const u = document.getElementById('btn-undo'); if (u) u.disabled = _hIdx <= 0;
  const r = document.getElementById('btn-redo'); if (r) r.disabled = _hIdx >= _hist.length - 1;
}

/* ══ Section list ═════════════════════════════════════════════════════ */
function _hasData(id) {
  const def = SECTIONS.find(s => s.id === id);
  if (!def) return false;
  try {
    const d = JSON.parse(localStorage.getItem(def.key) || 'null');
    if (!d) return false;
    switch(id) {
      case 'bidscore':   return (d.criteria ||[]).length > 0;
      case 'timeline':   return (d.projects ||[]).some(p => (p.bidTasks||[]).length + (p.execTasks||[]).length > 0);
      case 'commercial': return (d.costRows  ||[]).length > 0;
      case 'resources':  return (d.roles     ||[]).length > 0;
      case 'risks':      return (d.risks     ||[]).length > 0;
      case 'suppliers':  return (d.items     ||[]).length > 0;
      case 'actions':    return (d.actions   ||[]).length > 0;
    }
  } catch {}
  return false;
}

let _secDragSrc = null;

function _initSecDrag(row) {
  row.addEventListener('dragstart', e => {
    _secDragSrc = row; row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragend', () => {
    _secDragSrc = null;
    document.querySelectorAll('.sec-item').forEach(r => r.classList.remove('dragging','drag-over'));
  });
  row.addEventListener('dragover', e => {
    e.preventDefault();
    if (_secDragSrc && _secDragSrc !== row) row.classList.add('drag-over');
  });
  row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
  row.addEventListener('drop', e => {
    e.preventDefault(); row.classList.remove('drag-over');
    if (!_secDragSrc || _secDragSrc === row) return;
    const cont = document.getElementById('section-list');
    const items = [...cont.children];
    const si = items.indexOf(_secDragSrc), ti = items.indexOf(row);
    cont.insertBefore(_secDragSrc, si < ti ? row.nextSibling : row);
    _snapshot();
  });
}

function _buildSecRow(sec) {
  const hasData = _hasData(sec.id);
  const def = SECTIONS.find(s => s.id === sec.id);
  const row = document.createElement('div');
  row.className = 'sec-item' + (sec.enabled ? '' : ' sec-disabled');
  row.dataset.id = sec.id;
  row.draggable = true;
  row.innerHTML = `
    <span class="drag-handle" title="Drag to reorder">⋮⋮</span>
    <input type="checkbox" class="sec-cb" ${sec.enabled ? 'checked' : ''}
           onchange="toggleSection('${sec.id}',this.checked)">
    <div class="sec-item-info">
      <span class="sec-title-txt">${_esc(sec.title)}</span>
      <span class="sec-desc-txt">${_esc(def?.desc||'')}</span>
    </div>
    <span class="sec-badge ${hasData ? 'sb-ok' : 'sb-empty'}">${hasData ? '✓ Data' : 'No data'}</span>
  `;
  _initSecDrag(row);
  return row;
}

function renderSectionList(sections) {
  const cont = document.getElementById('section-list');
  cont.innerHTML = '';
  sections.forEach(sec => cont.appendChild(_buildSecRow(sec)));
}

function toggleSection(id, enabled) {
  const st = collectState();
  const sec = st.sections.find(s => s.id === id);
  if (sec) { sec.enabled = enabled; applyState(st); _snapshot(); }
}

/* ══ State ════════════════════════════════════════════════════════════ */
function collectState() {
  const rows = [...document.querySelectorAll('#section-list .sec-item')];
  const sections = rows.length
    ? rows.map(r => ({
        id:      r.dataset.id,
        enabled: r.querySelector('.sec-cb')?.checked ?? true,
        title:   r.querySelector('.sec-title-txt')?.textContent
                   || SECTIONS.find(s=>s.id===r.dataset.id)?.title || r.dataset.id,
      }))
    : SECTIONS.map(s => ({ id:s.id, enabled:true, title:s.title }));
  return {
    projName:        document.getElementById('proj-name')?.value        || '',
    customer:        document.getElementById('customer')?.value         || '',
    revision:        document.getElementById('revision')?.value         || 'Rev A',
    date:            document.getElementById('doc-date')?.value         || '',
    preparedBy:      document.getElementById('prepared-by')?.value      || '',
    confidentiality: document.getElementById('confidentiality')?.value  || '',
    sections,
  };
}

function applyState(s) {
  if (!s) return;
  const g = id => document.getElementById(id);
  if (s.projName        != null && g('proj-name'))       g('proj-name').value        = s.projName;
  if (s.customer        != null && g('customer'))         g('customer').value         = s.customer;
  if (s.revision        != null && g('revision'))         g('revision').value         = s.revision;
  if (s.date            != null && g('doc-date'))         g('doc-date').value         = s.date;
  if (s.preparedBy      != null && g('prepared-by'))      g('prepared-by').value      = s.preparedBy;
  if (s.confidentiality != null && g('confidentiality'))  g('confidentiality').value  = s.confidentiality;

  // Merge saved section order/state with current SECTIONS definitions
  const saved = s.sections || [];
  const ordered = [];
  saved.forEach(sv => {
    const def = SECTIONS.find(d => d.id === sv.id);
    if (def) ordered.push({ id:sv.id, enabled:sv.enabled !== false, title:sv.title || def.title });
  });
  SECTIONS.forEach(def => { if (!ordered.find(o => o.id === def.id)) ordered.push({ id:def.id, enabled:true, title:def.title }); });
  renderSectionList(ordered);
}

/* ══ File I/O ═════════════════════════════════════════════════════════ */
async function saveJSON() {
  const s = collectState();
  const fn = (s.projName||'bidpack').replace(/[^a-z0-9]/gi,'_') + '_bidpack.json';
  await nativeSaveText(fn, JSON.stringify(s,null,2), 'JSON', '.json');
}
function loadJSON(input) {
  const file = input?.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { try { applyState(JSON.parse(e.target.result)); _snapshot(); } catch { alert('Invalid JSON file.'); } };
  reader.readAsText(file);
  input.value = '';
}

/* ══ Helpers (shared with renderers) ═════════════════════════════════ */
function _esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function _fmtEUR(n) {
  return '€\u202f' + Math.round(parseFloat(n)||0).toLocaleString('en-GB');
}
function _fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return isNaN(d) ? iso : d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function _pageFooter(proj) {
  return `<div class="doc-page-ft"><span>${_esc(proj||'Bid Document')}</span><span>BidPack · PYL0N</span></div>`;
}
function _noDataPage(sec, num, source, proj) {
  return `<div class="doc-page">
    <div class="doc-page-hd"><div>
      <div class="doc-pg-num">Section ${num}</div>
      <div class="doc-pg-title">${_esc(sec.title)}</div>
    </div></div>
    <div class="no-data-box">
      <div style="font-size:28px;margin-bottom:8px;">—</div>
      <div>No data available</div>
      <div style="margin-top:4px;font-size:11px;">Open ${_esc(source)} and add data, then reassemble.</div>
    </div>
    ${_pageFooter(proj)}
  </div>`;
}

/* ══ Renderers — filled in Part 2 ════════════════════════════════════ */
function generate()   { alert('Renderers coming in Part 2!'); }
function goBack()     { document.getElementById('output').style.display='none'; document.getElementById('editor').style.display='block'; }
async function exportPDF()  { if(document.getElementById('output').style.display==='none') generate(); else window.print(); }
async function exportHTML() { alert('Export coming in Part 2!'); }

/* ══ Init ══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  SuiteManager.migrate();
  const saved = localStorage.getItem(STATE_KEY);
  if (saved) {
    try { applyState(JSON.parse(saved)); }
    catch { renderSectionList(SECTIONS.map(s => ({ id:s.id, enabled:true, title:s.title }))); }
  } else {
    const sync = SuiteManager.read();
    if (sync.projectName) document.getElementById('proj-name').value = sync.projectName;
    document.getElementById('doc-date').value = new Date().toISOString().slice(0,10);
    renderSectionList(SECTIONS.map(s => ({ id:s.id, enabled:true, title:s.title })));
  }
  SuiteManager.onUpdate((sync, key) => {
    if (key !== 'bidcast_suite_sync') return;
    const pn = document.getElementById('proj-name');
    if (pn && !pn.value && sync.projectName) pn.value = sync.projectName;
  });
  _snapshot();
});
</script>
