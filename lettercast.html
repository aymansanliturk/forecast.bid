  --text: #e8e6e1;

  body {

  /* ── Toolbar ── */
  #toolbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92);

  .tb-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .logo-icon {
    width: 28px; height: 28px;

  .tool-name { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }

  .tb-sep    { width: 1px; height: 22px; background: var(--border); }

  .tb-btn {

    padding: 6px 12px; border-radius: 7px;
    border: 1.5px solid var(--border);
    background: var(--bg); color: var(--muted);
    cursor: pointer; white-space: nowrap;

  /* ── Editor layout ── */
  #editor { max-width: 1500px; margin: 0 auto; padding: 24px 28px 60px; }

  /* ── Sections ── */

  .section-title { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ── Fields ── */
  .fields { display: grid; gap: 12px; }

  .f3 { grid-template-columns: 1fr 1fr 1fr; }
  label.field { display: flex; flex-direction: column; gap: 5px; font-size: 10.5px; font-weight: 600; color: var(--muted); }

  input[type=text], input[type=date], textarea, select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    background: var(--surface);

    transition: border-color .15s;

  /* ── Logo controls ── */

  /* ── Dynamic section blocks ── */
  .dyn-block {
    background: var(--surface);

    color: var(--faint); font-size: 14px;

  .btn-add-sec {

    border-radius: 10px;
    padding: 48px 52px;
    box-shadow: 0 2px 16px rgba(0,0,0,.07);

    display: flex;

  .out-subject {

  .out-footer {
    margin-top: 36px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 9px; color: var(--faint);
    text-align: center;
    font-family: 'DM Mono', monospace;

    .out-meta-right  { text-align: left; }
  }

<script>
/* ══ Helpers ══════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function gv(id)    { return (document.getElementById(id) || {}).value || ''; }
function sv(id, v) { const el = document.getElementById(id); if (el) el.value = v; }
function $id(id)   { return document.getElementById(id); }

/* ══ Logo management ══════════════════════════════════════════════════════ */
const LOGO_KEYS = { co: 'bidcast_logo', cx: 'bidcast_customer_logo' };

function uploadLogo(which, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try { localStorage.setItem(LOGO_KEYS[which], e.target.result); } catch {}
    renderLogoPreview(which, e.target.result);
    input.value = '';
    autoSave();
  };
  reader.readAsDataURL(file);
}

function clearLogo(which) {
  localStorage.removeItem(LOGO_KEYS[which]);
  renderLogoPreview(which, null);
  autoSave();
}

function renderLogoPreview(which, dataUrl) {
  const el = $id(which + '-preview');
  if (!el) return;
  el.innerHTML = dataUrl
    ? `<img src="${dataUrl}" style="max-height:42px;max-width:100%;object-fit:contain;">`
    : `<span>Click to upload</span>`;
}

function loadLogos() {
  renderLogoPreview('co', localStorage.getItem('bidcast_logo') || null);
  renderLogoPreview('cx', localStorage.getItem('bidcast_customer_logo') || null);
}

/* ══ Project Name Sync ══════════════════════════════════════════════════════ */
function onProjName() {
  SuiteManager.write({ projectName: gv('proj-name') }, 'lettercast');
  autoSave();
}

/* ══ Dynamic Sections ══════════════════════════════════════════════════════ */
let _secCount = 0;

/* Convert legacy plain-text saved content to HTML for the contenteditable editor */
function _toRichHtml(str) {
  if (!str) return '';
  if (/<[a-zA-Z][\s\S]*>/.test(str)) return str; // already HTML
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function _fmt(cmd, val) {
  document.execCommand(cmd, false, val || null);
}

function addSection(data) {
  _secCount++;
  const title   = data ? (data.title   || '') : '';
  const content = data ? (data.content || '') : '';

  const block = document.createElement('div');
  block.className  = 'dyn-block';
  block.dataset.id = _secCount;
  block.innerHTML  = `
    <div class="dyn-block-hd">
      <span class="drag-handle" title="Drag to reorder" aria-hidden="true">⠿</span>
      <input type="text" value="${esc(title)}" placeholder="Section Title" oninput="autoSave()">
      <button class="btn-del-sec" onclick="this.closest('.dyn-block').remove();autoSave();" title="Remove" aria-label="Remove">✕</button>
    </div>
    <div class="fmt-toolbar">
      <button class="fmt-btn" onmousedown="event.preventDefault();_fmt('bold')"            title="Bold (Ctrl+B)" aria-label="Bold (Ctrl+B)"><b>B</b></button>
      <button class="fmt-btn" onmousedown="event.preventDefault();_fmt('italic')"          title="Italic (Ctrl+I)" aria-label="Italic (Ctrl+I)"><i>I</i></button>
      <button class="fmt-btn" onmousedown="event.preventDefault();_fmt('underline')"       title="Underline (Ctrl+U)" aria-label="Underline (Ctrl+U)"><u>U</u></button>
      <button class="fmt-btn" onmousedown="event.preventDefault();_fmt('strikeThrough')"   title="Strikethrough" aria-label="Strikethrough"><s>S</s></button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onmousedown="event.preventDefault();_fmt('insertUnorderedList')" title="Bullet list" aria-label="Bullet list">• List</button>
      <button class="fmt-btn" onmousedown="event.preventDefault();_fmt('insertOrderedList')"   title="Numbered list" aria-label="Numbered list">1. List</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onmousedown="event.preventDefault();_fmt('removeFormat')"   title="Clear formatting" aria-label="Clear formatting">✕ fmt</button>
    </div>
    <div class="dyn-block-body" style="padding:0;">
      <div class="sec-body" contenteditable="true" spellcheck="true" oninput="autoSave()"></div>
    </div>`;

  block.querySelector('.sec-body').innerHTML = _toRichHtml(content);
  initDrag(block);
  $id('sections-list').appendChild(block);
  autoSave();
}

function initDrag(block) {
  const handle = block.querySelector('.drag-handle');
  const list   = $id('sections-list');

  handle.addEventListener('mousedown', () => { block.draggable = true; });
  document.addEventListener('mouseup',  () => { block.draggable = false; }, { passive: true });

  block.addEventListener('dragstart', e => {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', block.dataset.id);
    setTimeout(() => block.classList.add('dragging'), 0);
  });
  block.addEventListener('dragend', () => {
    block.draggable = false;
    block.classList.remove('dragging');
    list.querySelectorAll('.dyn-block').forEach(b => b.classList.remove('drag-over'));
    autoSave();
  });
  block.addEventListener('dragover', e => {
    e.preventDefault();
    list.querySelectorAll('.dyn-block').forEach(b => b.classList.remove('drag-over'));
    if (!block.classList.contains('dragging')) block.classList.add('drag-over');
  });
  block.addEventListener('dragleave', () => block.classList.remove('drag-over'));
  block.addEventListener('drop', e => {
    e.preventDefault();
    const srcId = e.dataTransfer.getData('text/plain');
    const src   = list.querySelector(`[data-id="${srcId}"]`);
    if (src && src !== block) {
      const blocks  = [...list.querySelectorAll('.dyn-block')];
      const srcPos  = blocks.indexOf(src);
      const tgtPos  = blocks.indexOf(block);
      srcPos < tgtPos ? list.insertBefore(src, block.nextSibling) : list.insertBefore(src, block);
    }
    block.classList.remove('drag-over');
  });
}

function insertRiskSummary() {
  let risks = [];
  try {
    const raw = localStorage.getItem('bidcast_state_riskcast');
    if (raw) risks = JSON.parse(raw).risks || [];
  } catch {}

  // Medium and above (score >= 8), risks only (not opportunities), sorted by score desc
  const filtered = risks
    .filter(r => r.type !== 'opportunity' && (r.score || (r.likelihood * r.impact)) >= 8)
    .sort((a, b) => (b.score || b.likelihood * b.impact) - (a.score || a.likelihood * a.impact));

  if (!filtered.length) {
    alert('No medium, high, or critical risks found in RiskCast. Add risks with a score of 8 or above first.');
    return;
  }

  function levelLabel(s) {
    if (s >= 20) return 'CRITICAL';
    if (s >= 12) return 'HIGH';
    return 'MEDIUM';
  }

  const lines = ['The following risks have been identified for this project:\n'];
  filtered.forEach(r => {
    const score = r.score || (r.likelihood * r.impact);
    const lvl   = levelLabel(score);
    const topic = [r.category, r.topic].filter(Boolean).join(' — ');
    lines.push(`• [${lvl}] ${topic}`);
    if (r.desc)       lines.push(`  ${r.desc}`);
    if (r.mitigation) lines.push(`  Mitigation: ${r.mitigation}`);
    lines.push('');
  });

  const content = lines.join('\n').trim();
  const TITLE   = 'Risks & Deviations';

  // Update existing section if one with this title already exists
  const existing = [...($id('sections-list')?.querySelectorAll('.dyn-block') || [])].find(
    b => b.querySelector('input[type=text]')?.value.trim() === TITLE
  );
  if (existing) {
    existing.querySelector('.sec-body').innerHTML = _toRichHtml(content);
    autoSave();
  } else {
    addSection({ title: TITLE, content });
  }
}

function getSections() {
  return [...$id('sections-list').querySelectorAll('.dyn-block')].map(b => ({
    title:   b.querySelector('input[type=text]').value,
    content: b.querySelector('.sec-body').innerHTML,
  }));
}

/* ══ Generate Output ════════════════════════════════════════════════════════ */
function generate() {
  const coLogo = localStorage.getItem('bidcast_logo');
  const cxLogo = localStorage.getItem('bidcast_customer_logo');

  /* logos */
  const outCo = $id('out-co-logo');
  const outCx = $id('out-cx-logo');
  if (coLogo) { outCo.src = coLogo; outCo.style.display = ''; }
  else         { outCo.style.display = 'none'; }
  if (cxLogo) { outCx.src = cxLogo; outCx.style.display = ''; }
  else         { outCx.style.display = 'none'; }
  $id('out-header').style.display = (coLogo || cxLogo) ? 'flex' : 'none';

  /* meta */
  const rawDate = gv('doc-date');
  const fmtDate = rawDate
    ? new Date(rawDate + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })
    : '—';

  $id('out-meta-left').innerHTML =
    `<strong>${esc(gv('cust-company') || '—')}</strong><br>` +
    `Attn: ${esc(gv('cust-attn') || '—')}`;

  $id('out-meta-right').innerHTML =
    `${fmtDate}<br>${esc(gv('doc-ref') || '')}`;

  /* subject */
  $id('out-subject').innerHTML =
    `<span class="re-label">Re:</span>${esc(gv('doc-subject'))}`;

  /* introduction */
  $id('out-intro').textContent = gv('intro-text');

  /* sections */
  const container = $id('out-sections');
  container.innerHTML = '';
  getSections().forEach(s => {
    if (!s.title && !s.content) return;
    const div  = document.createElement('div');
    div.className = 'out-sec';
    const h3   = document.createElement('h3');
    const body = document.createElement('div');
    h3.textContent  = s.title;
    body.className  = 'sec-content';
    body.innerHTML  = s.content;
    div.appendChild(h3);
    div.appendChild(body);
    container.appendChild(div);
  });

  /* footer date */
  $id('out-gen-date').textContent = new Date().toLocaleDateString('en-GB', { month:'long', year:'numeric' });

  /* swap view */
  $id('editor').style.display   = 'none';
  $id('toolbar').style.display  = 'none';
  $id('out-toolbar').style.display = 'block';
  $id('output').classList.add('visible');
  window.scrollTo(0, 0);
}

function goBack() {
  $id('editor').style.display   = 'block';
  $id('toolbar').style.display  = 'flex';
  $id('out-toolbar').style.display = 'none';
  $id('output').classList.remove('visible');
}

function exportPDF() {
  if (!$id('output').classList.contains('visible')) generate();
  setTimeout(() => window.print(), 120);
}

/* ══ State ════════════════════════════════════════════════════════════════ */
function collectState() {
  return {
    version:     '1.0',
    projName:    gv('proj-name'),
    docDate:     gv('doc-date'),
    docRef:      gv('doc-ref'),
    custCompany: gv('cust-company'),
    custAttn:    gv('cust-attn'),
    docSubject:  gv('doc-subject'),
    introText:   gv('intro-text'),
    sections:    getSections(),
  };
}

function applyState(s) {
  if (!s) return;
  sv('proj-name',    s.projName    || '');
  sv('doc-date',     s.docDate     || '');
  sv('doc-ref',      s.docRef      || '');
  sv('cust-company', s.custCompany || '');
  sv('cust-attn',    s.custAttn    || '');
  sv('doc-subject',  s.docSubject  || '');
  sv('intro-text',   s.introText   || '');

  $id('sections-list').innerHTML = '';
  _secCount = 0;
  (s.sections || []).forEach(sec => addSection(sec));
}

function autoSave() {
  _scheduleSnap();
}

async function saveJSON() {
  const s    = collectState();
  const name = (s.projName || 'LetterCast').replace(/[^a-z0-9]/gi, '_');
  await nativeSaveText(name + '_LetterCast.json', JSON.stringify(s, null, 2), 'JSON Files', 'json');
  const c = document.getElementById('save-confirm');
  if (c) { c.style.display = 'inline'; setTimeout(() => c.style.display = 'none', 2000); }
  _writeBackup();
}

function loadJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try   { const _s = JSON.parse(e.target.result); PylonValidate.checkImport(_s, 'lettercast'); applyState(_s); autoSave(); }
    catch { alert('Invalid JSON file — please check the format.'); }
    finally { input.value = ''; }
  };
  reader.readAsText(file);
}

/* ══ Undo / Redo (backed by vendor/pyl0n-state.js) ═══════════════════════ */
const STATE_KEY = 'bidcast_state_lettercast';
let _lastSaved = null;

const _undoStack = PylonState.createUndoStack({
  collect:    collectState,
  apply:      applyState,
  max:        50,
  debounceMs: 800,
  onChange:   () => {
    _syncUndoUI();
    PylonState.safeWriteLS(STATE_KEY, collectState());
    _lastSaved = Date.now(); _updateSavedLabel();
  },
});

function _snapshot()     { _undoStack.snapshot(); }
function _scheduleSnap() { _undoStack.scheduleSnap(); }
function _syncUndoUI() {
  const u = document.getElementById('btn-undo');
  const r = document.getElementById('btn-redo');
  if (u) u.disabled = !_undoStack.canUndo;
  if (r) r.disabled = !_undoStack.canRedo;
}
function _updateSavedLabel() {
  const el = document.getElementById('autosave-label');
  if (!el) return;
  if (!_lastSaved) { el.textContent = ''; return; }
  const s = Math.floor((Date.now() - _lastSaved) / 1000);
  el.textContent = s < 5 ? '● Saved' : s < 60 ? '● Saved ' + s + 's ago' : '● Saved ' + Math.floor(s / 60) + 'm ago';
}
function undo() { _undoStack.undo(); }
function redo() { _undoStack.redo(); }
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
    if (e.key === 's') { e.preventDefault(); saveJSON(); }
    if (e.key === 'e') { e.preventDefault(); exportPDF(); }
  }
});

/* ══ Boot ═════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  _applyTheme(localStorage.getItem('bidcast_theme') || 'light');
  SuiteManager.migrate();
  loadLogos();

  /* default date = today */
  const today = new Date().toISOString().slice(0, 10);
  $id('doc-date').value = today;

  /* restore persisted state */
  const saved = PylonState.safeReadLS(STATE_KEY);
  if (saved) {
    try {
      applyState(saved);
      if (!saved.docDate) sv('doc-date', today);
    } catch {
      addDefaultSections();
    }
  } else {
    addDefaultSections();
  }

  // Always apply current workspace project name (workspace is source of truth)
  const _bootSync = SuiteManager.read();
  const _nameEl = $id('proj-name');
  if (_nameEl && _bootSync.projectName && _bootSync.projectName !== 'Project Name')
    sv('proj-name', _bootSync.projectName);


  /* cross-tool sync listener */
  SuiteManager.onUpdate(sync => {
    const nameEl = $id('proj-name');
    if (nameEl && document.activeElement !== nameEl && sync.projectName)
      sv('proj-name', sync.projectName);
    loadLogos();
  });

  /* autosave on any editor input */
  $id('editor').addEventListener('input',  autoSave);
  $id('editor').addEventListener('change', autoSave);

  setTimeout(_snapshot, 300);
  _lastSaved = Date.now(); _updateSavedLabel();
  setInterval(_updateSavedLabel, 15000);
});

function addDefaultSections() {
  addSection({ title: '1. Scope of Supply',          content: '' });
  addSection({ title: '2. Assumptions & Deviations', content: '' });
  addSection({ title: '3. Terms & Conditions',       content: '' });
}

/* ── Dark mode ── */
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('bidcast_theme', newTheme);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = newTheme === 'dark' ? '☀' : '🌙';
  try {
    const sync = JSON.parse(localStorage.getItem('bidcast_suite_sync') || '{}');
    sync.theme = newTheme; sync._ts = Date.now();
    localStorage.setItem('bidcast_suite_sync', JSON.stringify(sync));
  } catch(e) {}
}
function _applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme || 'light');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
}

function _writeBackup() {
  const state = PylonState.safeReadLS(STATE_KEY);
  if (!state) return;
  const stateStr = JSON.stringify(state);
  localStorage.setItem('bidcast_backup_lettercast_' + Date.now(), stateStr);
  // Prune: keep only last 5 backups for this tool
  const prefix = 'bidcast_backup_lettercast_';
  const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix)).sort();
  while (keys.length > 5) localStorage.removeItem(keys.shift());
}

function _showBackups() {
  const existing = document.getElementById('backup-popover');
  if (existing) { existing.remove(); return; }
  const prefix = 'bidcast_backup_lettercast_';
  const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix)).sort().reverse();
  const pop = document.createElement('div');
  pop.id = 'backup-popover';
  pop.style.cssText = 'position:absolute;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;min-width:220px;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);font-size:11px;';
  if (keys.length === 0) {
    pop.innerHTML = '<div style="color:var(--faint);padding:4px 6px;">No backups yet.</div>';
  } else {
    keys.forEach(k => {
      const ts = parseInt(k.replace(prefix, ''));
      const d = new Date(ts);
      const ago = _relTime(ts);
      const item = document.createElement('div');
      item.style.cssText = 'padding:5px 8px;cursor:pointer;border-radius:4px;';
      item.textContent = ago + ' — ' + d.toLocaleTimeString();
      item.onmouseover = () => item.style.background = 'var(--bg)';
      item.onmouseout  = () => item.style.background = '';
      item.onclick = () => {
        if (!confirm('Restore this backup? Current state will be replaced.')) return;
        try { applyState(JSON.parse(localStorage.getItem(k))); pop.remove(); } catch(e) { alert('Could not restore backup.'); }
      };
      pop.appendChild(item);
    });
  }
  // Position near the backup button
  const btn = document.getElementById('backup-btn');
  if (btn) {
    const rect = btn.getBoundingClientRect();
    pop.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    pop.style.right = (window.innerWidth - rect.right) + 'px';
    pop.style.left = 'auto';
  }
  document.body.appendChild(pop);
  setTimeout(() => document.addEventListener('click', function _cl(e) {
    if (!pop.contains(e.target) && e.target.id !== 'backup-btn') { pop.remove(); document.removeEventListener('click', _cl); }
  }), 50);
}

function _relTime(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)  return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
