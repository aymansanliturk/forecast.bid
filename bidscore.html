<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BidScore · PYL0N</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="libs/xlsx.full.min.js"></script>
  <script src="libs/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="libs/fonts.css">
  <script src="vendor/pyl0n-native.js"></script>
  <script src="libs/msal-browser.min.js"></script>
  <script src="vendor/pyl0n-cloud.js"></script>
  <script src="vendor/pyl0n-state.js"></script>
  <script src="vendor/pyl0n-validate.js"></script>
  <script src="vendor/pyl0n-suite.js"></script>
  <style>
    :root {
      --bg:#f5f4f0; --surface:#fff; --border:#e0ddd6; --text:#1a1916;
      --accent:#0891b2; --green:#059669; --amber:#d97706; --red:#dc2626;
      --faint:#9c9a94; --muted:#6b6966;
      --navy:#1e3a6b;
      --sidebar-w: 272px;
    }
    [data-theme="dark"] {
      --bg:#111110; --surface:#1c1c1a; --border:#2e2d2a; --text:#f0ede8;
      --faint:#6b6966; --muted:#9c9a94;
    }
    [data-theme="dark"] header { background: rgba(28,28,26,0.97); }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'DM Sans',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      height:100vh; overflow:hidden; display:flex; flex-direction:column;
    }

    /* ── Header ── */
    header {
      height:48px; flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; gap:12px;
      background:var(--surface); border-bottom:1px solid var(--border);
      position:relative; z-index:200;
    }
    .hdr-left  { display:flex; align-items:center; gap:10px; min-width:0; }
    .hdr-right { display:flex; align-items:center; gap:4px; flex-shrink:0; }

    .hdr-logo {
      display:flex; align-items:center; justify-content:center;
      width:28px; height:28px; background:var(--navy); border-radius:7px;
      flex-shrink:0; text-decoration:none; transition:opacity 0.15s;
    }
    .hdr-logo:hover { opacity:0.8; }
    .hdr-logo svg { width:14px; height:14px; }

    .hdr-div { width:1px; height:18px; background:var(--border); flex-shrink:0; }

    .breadcrumb { display:flex; align-items:center; gap:5px; min-width:0; }
    .bc-link {
      font-size:13px; color:var(--muted); text-decoration:none;
      white-space:nowrap; transition:color 0.15s;
    }
    .bc-link:hover { color:var(--text); }
    .bc-sep { font-size:11px; color:var(--faint); flex-shrink:0; }
    .bc-current { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; }

    .hdr-icon-btn {
      width:30px; height:30px; border-radius:6px; border:none;
      background:transparent; color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s, color 0.15s; flex-shrink:0;
    }
    .hdr-icon-btn:hover { background:var(--bg); color:var(--text); }
    .hdr-icon-btn svg { width:15px; height:15px; pointer-events:none; }

    /* ── App body ── */
    .app-body { display:flex; flex:1; overflow:hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width:var(--sidebar-w); flex-shrink:0;
      background:var(--surface); border-right:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
      transition:width 0.22s ease;
    }
    .sidebar.collapsed { width:0; }
    .sidebar-inner { width:var(--sidebar-w); overflow-y:auto; flex:1; display:flex; flex-direction:column; }

    .sb-section { padding:18px 16px; border-bottom:1px solid var(--border); }
    .sb-section:last-child { border-bottom:none; }
    .sb-hd {
      font-size:9px; font-weight:700; letter-spacing:1.2px;
      text-transform:uppercase; color:var(--faint); margin-bottom:12px;
    }

    .sb-field { margin-bottom:10px; }
    .sb-field:last-child { margin-bottom:0; }
    .sb-field label {
      display:block; font-size:10px; font-weight:600; color:var(--faint);
      letter-spacing:0.8px; text-transform:uppercase; margin-bottom:4px;
    }
    .sb-field input, .sb-field textarea {
      width:100%; padding:7px 9px; border:1.5px solid var(--border); border-radius:7px;
      background:var(--bg); color:var(--text); font-size:13px;
      font-family:inherit; transition:border-color 0.15s;
    }
    .sb-field input:focus, .sb-field textarea:focus {
      outline:none; border-color:var(--accent); background:var(--surface);
    }
    .sb-field textarea { resize:vertical; min-height:72px; }

    .sb-actions-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:6px;
    }
    .sb-btn {
      font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
      padding:7px 10px; border-radius:7px; border:1.5px solid var(--border);
      background:var(--bg); color:var(--muted); cursor:pointer;
      white-space:nowrap; transition:all 0.15s; text-align:center;
    }
    .sb-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--surface); }
    .sb-btn:disabled { opacity:0.35; pointer-events:none; }
    .sb-btn.full  { grid-column:1/-1; }
    .sb-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
    .sb-btn.primary:hover { opacity:0.88; }
    .sb-btn.green { background:var(--green); color:#fff; border-color:var(--green); font-weight:600; }
    .sb-btn.green:hover { opacity:0.88; }

    /* ── Canvas ── */
    .canvas { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; }

    .canvas-score-bar {
      flex-shrink:0; padding:10px 24px;
      background:var(--surface); border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    }
    .score-bar-label { font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .score-bar-track { flex:1; min-width:60px; height:7px; background:var(--border); border-radius:4px; overflow:hidden; }
    .score-bar-fill  { height:100%; border-radius:4px; transition:width 0.5s ease, background 0.3s; }
    .score-bar-num   { font-size:18px; font-weight:700; font-family:'DM Mono',monospace; min-width:38px; text-align:right; }
    .verdict-pill {
      padding:3px 11px; border-radius:20px; font-size:10px; font-weight:700;
      letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap;
    }
    .v-bid  { background:#dcfce7; color:#15803d; }
    .v-cond { background:#fef3c7; color:#b45309; }
    .v-no   { background:#fee2e2; color:#dc2626; }

    .canvas-body { flex:1; overflow-y:auto; padding:24px; }
    .canvas-body-inner { max-width:960px; margin:0 auto; }

    .sec-title { font-size:11px; font-weight:700; color:var(--faint); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }

    /* ── Criteria table ── */
    .crit-wrap { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:12px; }

    .crit-head, .crit-row {
      display:grid;
      grid-template-columns:28px 120px 1fr 72px 130px 64px auto;
      align-items:center; padding:8px 10px; gap:4px;
    }
    .crit-head { background:var(--bg); border-bottom:1px solid var(--border); }
    .crit-head-cell { font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:0.8px; }
    .crit-head-cell.r { text-align:right; }

    .crit-row { border-bottom:1px solid var(--border); transition:background 0.12s; }
    .crit-row:last-child { border-bottom:none; }
    .crit-row:hover { background:var(--bg); }
    .crit-row.dragging { opacity:0.35; }
    .crit-row.drag-over { border-top:2px solid var(--accent); }

    .drag-handle { cursor:grab; color:var(--faint); font-size:14px; padding:2px 4px; user-select:none; }
    .drag-handle:active { cursor:grabbing; }

    .ci {
      width:100%; padding:5px 7px; border:1.5px solid transparent; border-radius:6px;
      background:transparent; color:var(--text); font-size:13px; font-family:inherit; transition:border-color 0.15s;
    }
    .ci:focus { outline:none; border-color:var(--accent); background:var(--surface); }
    .ci.cat { font-size:12px; color:var(--muted); }
    .ci.mono { font-family:'DM Mono',monospace; text-align:right; }

    .score-sel {
      width:100%; padding:5px 6px; border:1.5px solid var(--border); border-radius:6px;
      background:var(--surface); color:var(--text); font-size:12px; font-family:inherit; cursor:pointer;
    }
    .score-sel:focus { outline:none; border-color:var(--accent); }

    .wtd-cell { font-size:12px; font-weight:600; font-family:'DM Mono',monospace; text-align:right; color:var(--accent); padding:0 4px; }

    .del-btn { color:var(--faint); background:none; border:none; cursor:pointer; font-size:16px; padding:3px 7px; border-radius:5px; transition:all 0.15s; }
    .del-btn:hover { color:var(--red); background:#fef2f2; }

    .crit-footer {
      padding:10px 12px; display:flex; align-items:center; justify-content:space-between;
      background:var(--bg); border-top:1px solid var(--border);
    }
    .add-btn {
      padding:6px 14px; border:1.5px dashed var(--border); border-radius:7px;
      background:none; color:var(--muted); font-size:12px; font-weight:600;
      cursor:pointer; transition:all 0.15s; font-family:inherit;
    }
    .add-btn:hover { border-color:var(--accent); color:var(--accent); }
    .weight-total { font-size:12px; font-weight:600; font-family:'DM Mono',monospace; }
    .weight-total.ok   { color:var(--green); }
    .weight-total.warn { color:var(--amber); }
    .weight-total.bad  { color:var(--red); }

    .score-hint { font-size:11px; color:var(--faint); margin-top:8px; }

    /* ── Output ── */
    #editor  { display:contents; }
    #output  { display:none; flex:1; overflow-y:auto; padding:28px 24px 60px; }
    #output.visible { display:block; }

    .out-toolbar { max-width:900px; margin:0 auto 20px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

    .out-card {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:14px; padding:32px; margin:0 auto 20px; max-width:900px;
    }
    .out-hdr {
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:16px; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border);
    }
    .out-logo { height:30px; object-fit:contain; display:block; margin-bottom:8px; }
    .out-proj-name { font-size:22px; font-weight:700; letter-spacing:-0.5px; margin-bottom:4px; }
    .out-proj-meta { font-size:12px; color:var(--muted); }

    .gauge-wrap { display:flex; flex-direction:column; align-items:center; padding:8px 0 16px; }
    .gauge-bg   { fill:none; stroke:var(--border); stroke-width:14; stroke-linecap:round; }
    .gauge-fill { fill:none; stroke-width:14; stroke-linecap:round; transition:stroke-dasharray 1s cubic-bezier(.4,0,.2,1), stroke .4s; }
    .gauge-num  { font-size:38px; font-weight:700; font-family:'DM Mono',monospace; text-anchor:middle; }
    .gauge-sub  { font-size:13px; text-anchor:middle; }
    .out-verdict { margin-top:10px; font-size:17px; font-weight:700; letter-spacing:0.5px; }

    .cat-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .cat-lbl  { width:110px; font-size:13px; font-weight:600; flex-shrink:0; }
    .cat-track{ flex:1; height:7px; background:var(--border); border-radius:4px; overflow:hidden; }
    .cat-fill { height:100%; border-radius:4px; }
    .cat-val  { width:52px; text-align:right; font-size:12px; font-weight:600; font-family:'DM Mono',monospace; color:var(--muted); flex-shrink:0; }

    .out-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:4px; }
    .out-table th { padding:7px 8px; text-align:left; font-size:10px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:.8px; border-bottom:1.5px solid var(--border); white-space:nowrap; }
    .out-table td { padding:8px 8px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .out-table tr:last-child td { border-bottom:none; }
    .out-table .r { text-align:right; font-family:'DM Mono',monospace; font-weight:600; }
    .score-dot { display:inline-flex; width:22px; height:22px; border-radius:50%; color:#fff; font-size:11px; font-weight:700; align-items:center; justify-content:center; }
    .out-total td { font-weight:700; border-top:2px solid var(--border); padding-top:11px; }
    .out-section { margin-top:22px; padding-top:20px; border-top:1px solid var(--border); }
    .out-sec-title { font-size:11px; font-weight:700; color:var(--faint); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
    .out-notes { font-size:13px; line-height:1.65; white-space:pre-wrap; }
    .out-footer { font-size:10px; color:var(--faint); text-align:center; padding-top:18px; margin-top:20px; border-top:1px solid var(--border); }

    /* ── tb-btn alias (used in generated output toolbar) ── */
    .tb-btn {
      font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500;
      padding:6px 12px; border-radius:7px; border:1.5px solid var(--border);
      background:var(--bg); color:var(--muted); cursor:pointer; white-space:nowrap; transition:all .15s;
    }
    .tb-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--surface); }

    /* ── Nav popover ── */
    .bc-btn {
      background: none; border: none; padding: 0; cursor: pointer;
      font-size: 13px; color: var(--muted); font-family: inherit;
      transition: color 0.15s; display: flex; align-items: center; gap: 4px;
    }
    .bc-btn:hover { color: var(--text); }
    .bc-btn .bc-caret { font-size: 9px; opacity: 0.6; transition: transform 0.15s; }
    .bc-btn.open .bc-caret { transform: rotate(180deg); }

    .nav-popover {
      position: fixed; top: 49px; left: 0;
      width: 492px;
      background: var(--surface); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 14px 14px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.13);
      z-index: 400; padding: 14px;
      animation: navPopIn 0.16s ease;
    }
    @keyframes navPopIn {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .nav-pop-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 10px; margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .nav-pop-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.1px; color: var(--faint); }
    .nav-pop-dash  { font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none; }
    .nav-pop-dash:hover { text-decoration: underline; }

    .nav-pop-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
    }

    .nav-tool-card {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 9px; border-radius: 8px;
      text-decoration: none; color: var(--text);
      transition: background 0.12s; cursor: pointer;
    }
    .nav-tool-card:hover { background: var(--bg); }
    .nav-tool-card.ntc-active { background: var(--bg); outline: 1.5px solid var(--border); }

    .ntc-icon {
      width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
      font-family: 'DM Mono', monospace;
    }
    .ntc-info { min-width: 0; }
    .ntc-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ntc-tag  { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    @media print {
      body { height:auto; overflow:visible; }
      header, .sidebar, .canvas-score-bar, .out-toolbar { display:none !important; }
      .app-body, .canvas { display:block; overflow:visible; }
      #editor { display:none !important; }
      #output { display:block !important; padding:0; }
      .out-card { border:none; padding:0; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="hdr-left">
    <a class="hdr-logo" href="index.html" title="Dashboard">
      <svg viewBox="0 0 18 18" fill="none">
        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="white"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="white"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="white"/>
        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="white" opacity="0.4"/>
      </svg>
    </a>
    <div class="hdr-div"></div>
    <nav class="breadcrumb">
      <button class="bc-btn" id="dashboard-btn" onclick="toggleNavPopover(event)">Dashboard <span class="bc-caret">▾</span></button>
      <span class="bc-sep">›</span>
      <span class="bc-current">BidScore</span>
    </nav>
  </div>
  <div class="hdr-right">
    <button class="hdr-icon-btn" id="sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
    <button class="hdr-icon-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle dark mode" style="font-size:15px;">🌙</button>
  </div>
</header>

<!-- ── Tool nav popover ── -->
<div id="nav-popover" class="nav-popover" style="display:none" onclick="event.stopPropagation()">
  <div class="nav-pop-hd">
    <span class="nav-pop-title">All Tools</span>
    <a href="index.html" class="nav-pop-dash">Dashboard →</a>
  </div>
  <div class="nav-pop-grid" id="nav-pop-grid"></div>
</div>

<!-- ── Editor (sidebar + canvas) ── -->
<div id="editor">
  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <div class="sb-section">
          <div class="sb-hd">Project Details</div>
          <div class="sb-field">
            <label>Project Name</label>
            <input type="text" id="proj-name" placeholder="e.g. ABC Wind Farm EPC" oninput="_scheduleSnap();_suiteWrite()">
          </div>
          <div class="sb-field">
            <label>Bid Reference</label>
            <input type="text" id="bid-ref" placeholder="e.g. ITT-2024-001" oninput="_scheduleSnap()">
          </div>
          <div class="sb-field">
            <label>Assessment Date</label>
            <input type="date" id="bid-date" oninput="_scheduleSnap()">
          </div>
          <div class="sb-field">
            <label>Assessed By</label>
            <input type="text" id="assessed-by" placeholder="Name / Team" oninput="_scheduleSnap()">
          </div>
          <div class="sb-field">
            <label>Decision Notes</label>
            <textarea id="decision-notes" placeholder="Key observations, conditions, or action items…" oninput="_scheduleSnap()"></textarea>
          </div>
        </div>

        <div class="sb-section">
          <div class="sb-hd">Actions</div>
          <div class="sb-actions-grid">
            <button class="sb-btn" id="btn-undo" onclick="undo()" disabled>↩ Undo</button>
            <button class="sb-btn" id="btn-redo" onclick="redo()" disabled>↪ Redo</button>
            <button class="sb-btn" onclick="saveJSON()">💾 Save</button>
            <label class="sb-btn" style="cursor:pointer;">↑ Load<input type="file" accept=".json" style="display:none" onchange="loadJSON(this)"></label>
            <button class="sb-btn" onclick="exportExcel()">Excel</button>
            <button class="sb-btn" onclick="exportHTML()">HTML</button>
            <button class="sb-btn full" onclick="exportPDF()">↓ Export PDF</button>
            <button class="sb-btn full primary" onclick="generate()">Preview Report ›</button>
          </div>
        </div>

      </div>
    </aside>

    <!-- Canvas -->
    <div class="canvas">
      <div class="canvas-score-bar">
        <span class="score-bar-label">Overall Score</span>
        <div class="score-bar-track">
          <div class="score-bar-fill" id="score-bar-fill" style="width:0%;background:var(--faint)"></div>
        </div>
        <span class="score-bar-num" id="score-bar-num" style="color:var(--faint)">—</span>
        <span class="verdict-pill v-cond" id="live-verdict" style="display:none"></span>
      </div>
      <div class="canvas-body">
        <div class="canvas-body-inner">
          <div class="sec-title">Scoring Criteria</div>
          <div class="crit-wrap">
            <div class="crit-head">
              <div></div>
              <div class="crit-head-cell">Category</div>
              <div class="crit-head-cell">Criterion</div>
              <div class="crit-head-cell r">Wt %</div>
              <div class="crit-head-cell">Score</div>
              <div class="crit-head-cell r">Wtd</div>
              <div></div>
            </div>
            <div id="crit-body"></div>
            <div class="crit-footer">
              <button class="add-btn" onclick="addCriterion()">+ Add Criterion</button>
              <span class="weight-total warn" id="weight-total">Weight: 0%</span>
            </div>
          </div>
          <div class="score-hint">
            Score 1–5: &nbsp; 1 = Very Unfavorable &nbsp;·&nbsp; 3 = Neutral &nbsp;·&nbsp; 5 = Very Favorable to Bid
            &nbsp;|&nbsp; <strong>BID</strong> ≥65 &nbsp;·&nbsp; <strong>CONDITIONAL</strong> 40–64 &nbsp;·&nbsp; <strong>NO BID</strong> &lt;40
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── Output (preview) ── -->
<div id="output"></div>

<datalist id="cat-list">
  <option value="Strategic">
  <option value="Commercial">
  <option value="Technical">
  <option value="Risk">
</datalist>

<script>

/* ══ Constants ════════════════════════════════════════════════════════ */
const STATE_KEY = 'bidcast_state_bidscore';
let _nextId = 100;

const DEFAULT_CRITERIA = [
  { id:1,  category:'Strategic',  name:'Strategic alignment with company goals',       weight:10, score:3, notes:'' },
  { id:2,  category:'Strategic',  name:'Reference value and market positioning',       weight:8,  score:3, notes:'' },
  { id:3,  category:'Strategic',  name:'Customer relationship quality',                weight:7,  score:3, notes:'' },
  { id:4,  category:'Commercial', name:'Expected EBIT margin potential',               weight:12, score:3, notes:'' },
  { id:5,  category:'Commercial', name:'Contract type and payment terms',              weight:8,  score:3, notes:'' },
  { id:6,  category:'Commercial', name:'Order backlog contribution',                   weight:7,  score:3, notes:'' },
  { id:7,  category:'Technical',  name:'Technical capability and project experience',  weight:12, score:3, notes:'' },
  { id:8,  category:'Technical',  name:'Team availability and capacity',               weight:8,  score:3, notes:'' },
  { id:9,  category:'Risk',       name:'Overall project risk level',                   weight:10, score:3, notes:'5 = very low risk' },
  { id:10, category:'Risk',       name:'Competition intensity',                        weight:8,  score:3, notes:'5 = low competition' },
  { id:11, category:'Risk',       name:'Schedule and delivery feasibility',            weight:10, score:3, notes:'' },
];

/* ══ Undo / Redo (backed by vendor/pyl0n-state.js) ════════════════════ */
const _undoStack = PylonState.createUndoStack({
  collect: collectState, apply: applyState, max: 60, debounceMs: 600,
  onChange: () => {
    const u = document.getElementById('btn-undo');
    const r = document.getElementById('btn-redo');
    if (u) u.disabled = !_undoStack.canUndo;
    if (r) r.disabled = !_undoStack.canRedo;
    PylonState.safeWriteLS(STATE_KEY, collectState());
  },
});
function _snapshot()     { _undoStack.snapshot(); }
function _scheduleSnap() { _undoStack.scheduleSnap(); }
function undo()          { _undoStack.undo(); }
function redo()          { _undoStack.redo(); }

/* ══ State ════════════════════════════════════════════════════════════ */
function collectState() {
  return {
    projName:   document.getElementById('proj-name')?.value    || '',
    bidRef:     document.getElementById('bid-ref')?.value      || '',
    bidDate:    document.getElementById('bid-date')?.value     || '',
    assessedBy: document.getElementById('assessed-by')?.value  || '',
    notes:      document.getElementById('decision-notes')?.value|| '',
    criteria:   _getCriteria(),
  };
}

function applyState(s) {
  if (!s) return;
  document.getElementById('proj-name').value      = s.projName   || '';
  document.getElementById('bid-ref').value        = s.bidRef     || '';
  document.getElementById('bid-date').value       = s.bidDate    || '';
  document.getElementById('assessed-by').value    = s.assessedBy || '';
  document.getElementById('decision-notes').value = s.notes      || '';
  document.getElementById('crit-body').innerHTML  = '';
  (s.criteria || []).forEach(c => addCriterion(c));
  _refreshLiveScore();
}

function _saveLocal() { PylonState.safeWriteLS(STATE_KEY, collectState()); }

function _getCriteria() {
  return Array.from(document.querySelectorAll('#crit-body .crit-row')).map(row => ({
    id:       +row.dataset.id || 0,
    category: row.querySelector('.crit-cat')?.value   || '',
    name:     row.querySelector('.crit-name')?.value  || '',
    weight:   parseFloat(row.querySelector('.crit-wt')?.value)  || 0,
    score:    parseInt(row.querySelector('.score-sel')?.value)  || 3,
    notes:    row.querySelector('.crit-notes')?.value || '',
  }));
}

/* ══ Add / remove criteria ════════════════════════════════════════════ */
function addCriterion(data) {
  const id  = data?.id || (_nextId++);
  const cat = data?.category || '';
  const nm  = data?.name     || '';
  const wt  = data?.weight   != null ? data.weight : 10;
  const sc  = data?.score    != null ? data.score  : 3;
  const nt  = data?.notes    || '';

  const row = document.createElement('div');
  row.className = 'crit-row';
  row.dataset.id = id;
  row.draggable = true;
  row.innerHTML =
    `<span class="drag-handle" title="Drag to reorder">⠿</span>` +
    `<input class="ci cat crit-cat" type="text" value="${esc(cat)}" placeholder="Category" list="cat-list" oninput="_scheduleSnap();_refreshLiveScore()">` +
    `<input class="ci crit-name" type="text" value="${esc(nm)}" placeholder="Criterion name" oninput="_scheduleSnap();_refreshLiveScore()">` +
    `<input class="ci mono crit-wt" type="number" min="0" max="100" step="1" value="${wt}" oninput="_scheduleSnap();_refreshLiveScore()">` +
    `<select class="score-sel" onchange="_scheduleSnap();_refreshLiveScore()">` +
      [1,2,3,4,5].map(v=>`<option value="${v}"${v===sc?' selected':''}>${v} — ${_sLabel(v)}</option>`).join('') +
    `</select>` +
    `<span class="wtd-cell" id="wtd-${id}">—</span>` +
    `<div style="display:flex;align-items:center;gap:2px;">` +
      `<input class="ci crit-notes" type="text" value="${esc(nt)}" placeholder="Notes…" oninput="_scheduleSnap()" style="min-width:80px">` +
      `<button class="del-btn" onclick="removeCriterion(this)" title="Delete">×</button>` +
    `</div>`;

  _initDrag(row);
  document.getElementById('crit-body').appendChild(row);
  _refreshLiveScore();
}

function removeCriterion(btn) {
  btn.closest('.crit-row').remove();
  _snapshot();
  _refreshLiveScore();
}

function _sLabel(v) {
  return ['','Very Unfav.','Unfavorable','Neutral','Favorable','Very Fav.'][v] || '';
}

/* ══ Drag and drop ════════════════════════════════════════════════════ */
let _dragSrc = null;
function _initDrag(row) {
  row.addEventListener('dragstart', e => { _dragSrc = row; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  row.addEventListener('dragend',   () => { _dragSrc=null; document.querySelectorAll('.crit-row').forEach(r=>r.classList.remove('dragging','drag-over')); });
  row.addEventListener('dragover',  e => { e.preventDefault(); if(_dragSrc && _dragSrc!==row) row.classList.add('drag-over'); });
  row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
  row.addEventListener('drop',      e => { e.preventDefault(); row.classList.remove('drag-over'); if(_dragSrc && _dragSrc!==row){ row.before(_dragSrc); _snapshot(); _refreshLiveScore(); } });
}

/* ══ Live score ═══════════════════════════════════════════════════════ */
function computeScore(criteria) {
  let num = 0, den = 0;
  (criteria || []).forEach(c => {
    const w = parseFloat(c.weight) || 0;
    const s = parseInt(c.score)    || 0;
    num += w * s; den += w * 5;
  });
  return den > 0 ? Math.round(num / den * 100) : 0;
}

function verdictOf(score) {
  return score >= 65 ? 'BID' : score >= 40 ? 'CONDITIONAL' : 'NO BID';
}
function verdictClass(v) {
  return v === 'BID' ? 'v-bid' : v === 'CONDITIONAL' ? 'v-cond' : 'v-no';
}
function verdictColor(v) {
  return v === 'BID' ? 'var(--green)' : v === 'CONDITIONAL' ? 'var(--amber)' : 'var(--red)';
}

function _refreshLiveScore() {
  const criteria = _getCriteria();
  const score   = computeScore(criteria);
  const verdict = verdictOf(score);
  const color   = verdictColor(verdict);

  const totalW = criteria.reduce((a,c) => a + (parseFloat(c.weight)||0), 0);
  const wtEl   = document.getElementById('weight-total');
  if (wtEl) {
    wtEl.textContent = `Weight: ${Math.round(totalW * 10) / 10}%`;
    wtEl.className   = 'weight-total ' + (Math.abs(totalW-100) < 0.5 ? 'ok' : totalW > 100 ? 'bad' : 'warn');
  }

  criteria.forEach(c => {
    const el = document.getElementById('wtd-' + c.id);
    if (!el) return;
    const w = parseFloat(c.weight) || 0;
    const s = parseInt(c.score)    || 0;
    el.textContent = w > 0 ? (w * s / 5).toFixed(1) : '—';
  });

  const fill = document.getElementById('score-bar-fill');
  const num  = document.getElementById('score-bar-num');
  const pill = document.getElementById('live-verdict');
  if (fill) { fill.style.width = score + '%'; fill.style.background = color; }
  if (num)  { num.textContent = score; num.style.color = color; }
  if (pill) { pill.style.display = 'inline'; pill.textContent = verdict; pill.className = 'verdict-pill ' + verdictClass(verdict); }

  _saveLocal();
}

/* ══ Generate output view ═════════════════════════════════════════════ */
function generate() {
  const s       = collectState();
  const score   = computeScore(s.criteria);
  const verdict = verdictOf(score);
  const vColor  = verdictColor(verdict);
  const vClass  = verdictClass(verdict);

  const catMap = {};
  s.criteria.forEach(c => {
    const k = c.category || 'General';
    if (!catMap[k]) catMap[k] = { wSum:0, wScoreSum:0 };
    const w = parseFloat(c.weight)||0;
    const sc = parseInt(c.score)||0;
    catMap[k].wSum      += w;
    catMap[k].wScoreSum += w * sc;
  });

  const ARC = Math.PI * 80;
  const filled = +(score / 100 * ARC).toFixed(2);

  const logo    = SuiteManager.getLogo();
  const dateStr = s.bidDate
    ? new Date(s.bidDate + 'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
    : '—';

  const catRows = Object.entries(catMap).map(([cat, d]) => {
    const avg = d.wSum > 0 ? d.wScoreSum / d.wSum : 0;
    const pct = Math.round(avg / 5 * 100);
    return `<div class="cat-row">
      <div class="cat-lbl">${esc(cat)}</div>
      <div class="cat-track"><div class="cat-fill" style="width:${pct}%;background:${vColor}"></div></div>
      <div class="cat-val">${avg.toFixed(1)} / 5</div>
    </div>`;
  }).join('');

  const tableRows = s.criteria.map((c, i) => {
    const w   = parseFloat(c.weight)||0;
    const sc  = parseInt(c.score)||0;
    const wtd = w > 0 ? (w * sc / 5).toFixed(1) : '—';
    const dotBg = sc >= 4 ? 'var(--green)' : sc >= 3 ? 'var(--accent)' : sc >= 2 ? 'var(--amber)' : 'var(--red)';
    return `<tr>
      <td>${i+1}</td>
      <td style="color:var(--muted)">${esc(c.category)}</td>
      <td>${esc(c.name)}</td>
      <td class="r">${w}%</td>
      <td style="text-align:center"><span class="score-dot" style="background:${dotBg}">${sc}</span></td>
      <td class="r">${wtd}</td>
      <td style="color:var(--muted);font-size:11px">${esc(c.notes)}</td>
    </tr>`;
  }).join('');

  const totalW = s.criteria.reduce((a,c) => a+(parseFloat(c.weight)||0), 0);

  document.getElementById('output').innerHTML = `
    <div class="out-toolbar">
      <button class="tb-btn" onclick="goBack()">← Editor</button>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="tb-btn" onclick="exportPDF()">PDF</button>
        <button class="tb-btn" onclick="exportExcel()">Excel</button>
        <button class="tb-btn" onclick="exportHTML()">HTML</button>
      </div>
    </div>

    <div class="out-card" id="out-printable">
      <div class="out-hdr">
        <div>
          ${logo ? `<img class="out-logo" src="${logo}">` : ''}
          <div class="out-proj-name">${esc(s.projName || 'Untitled Bid')}</div>
          <div class="out-proj-meta">
            ${s.bidRef     ? `Ref: ${esc(s.bidRef)} &nbsp;·&nbsp; ` : ''}
            Date: ${dateStr}
            ${s.assessedBy ? ` &nbsp;·&nbsp; By: ${esc(s.assessedBy)}` : ''}
          </div>
        </div>
        <span class="verdict-pill ${vClass}" style="font-size:14px;padding:8px 20px;flex-shrink:0">${verdict}</span>
      </div>

      <div class="gauge-wrap">
        <svg viewBox="0 0 200 120" width="240" height="144" style="overflow:visible">
          <path class="gauge-bg"   d="M20,110 A80,80 0 0 1 180,110"
            stroke-dasharray="${ARC.toFixed(2)} ${(ARC*2).toFixed(2)}"/>
          <path class="gauge-fill" d="M20,110 A80,80 0 0 1 180,110"
            stroke="${vColor}"
            stroke-dasharray="${filled} ${(ARC*2).toFixed(2)}"/>
          <text class="gauge-num" x="100" y="100" fill="${vColor}">${score}</text>
          <text class="gauge-sub" x="100" y="116" fill="var(--muted)">out of 100</text>
        </svg>
        <div class="out-verdict" style="color:${vColor}">${verdict}</div>
      </div>

      ${Object.keys(catMap).length ? `
      <div class="out-section">
        <div class="out-sec-title">Category Breakdown</div>
        ${catRows}
      </div>` : ''}

      <div class="out-section">
        <div class="out-sec-title">Scoring Detail</div>
        <table class="out-table">
          <thead><tr>
            <th>#</th><th>Category</th><th>Criterion</th>
            <th style="text-align:right">Weight</th>
            <th style="text-align:center">Score</th>
            <th style="text-align:right">Weighted</th>
            <th>Notes</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
          <tfoot><tr class="out-total">
            <td colspan="3">Total</td>
            <td class="r">${Math.round(totalW * 10)/10}%</td>
            <td></td>
            <td class="r">${score}</td>
            <td></td>
          </tr></tfoot>
        </table>
      </div>

      ${s.notes ? `
      <div class="out-section">
        <div class="out-sec-title">Decision Notes</div>
        <div class="out-notes">${esc(s.notes)}</div>
      </div>` : ''}

      <div class="out-footer">Generated with BidScore · PYL0N Suite</div>
    </div>`;

  document.getElementById('editor').style.display = 'none';
  document.getElementById('output').style.display  = 'block';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('editor').style.display = 'contents';
  document.getElementById('output').style.display  = 'none';
}

/* ══ Sidebar toggle ═══════════════════════════════════════════════════ */
function toggleSidebar() {
  const sb  = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle-btn');
  const collapsed = sb.classList.toggle('collapsed');
  btn.style.opacity = collapsed ? '0.45' : '1';
}

/* ══ Exports ══════════════════════════════════════════════════════════ */
async function exportPDF() {
  generate();
  const el   = document.getElementById('out-printable');
  const name = (document.getElementById('proj-name')?.value || 'bidscore').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSavePDF(el, `BidScore_${name}.pdf`, {
    margin:10, image:{type:'jpeg',quality:0.97},
    html2canvas:{scale:2}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  });
}

async function exportExcel() {
  const s  = collectState();
  const wb = XLSX.utils.book_new();
  const score   = computeScore(s.criteria);
  const verdict = verdictOf(score);
  const rows = [
    ['BidScore — Bid/No-Bid Scorecard'],
    ['Project:',     s.projName],
    ['Bid Ref:',     s.bidRef],
    ['Date:',        s.bidDate],
    ['Assessed By:', s.assessedBy],
    [],
    ['#','Category','Criterion','Weight %','Score (1-5)','Weighted Score','Notes'],
  ];
  s.criteria.forEach((c, i) => {
    const w = parseFloat(c.weight)||0;
    const sc = parseInt(c.score)||0;
    rows.push([i+1, c.category, c.name, w, sc, +(w*sc/5).toFixed(2), c.notes]);
  });
  const totalW = s.criteria.reduce((a,c)=>a+(parseFloat(c.weight)||0),0);
  rows.push([], ['','','Total', Math.round(totalW*10)/10+'%', '', score, '']);
  rows.push([], ['Recommendation:', verdict]);
  if (s.notes) rows.push(['Notes:', s.notes]);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:4},{wch:14},{wch:44},{wch:10},{wch:12},{wch:16},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws, 'BidScore');
  const name = (s.projName||'bidscore').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSaveXLSX(wb, `BidScore_${name}.xlsx`);
}

async function exportHTML() {
  const s       = collectState();
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(s))));
  const src     = document.documentElement.outerHTML;
  const injected = src.replace('</body>',
    `<script>try{applyState(JSON.parse(decodeURIComponent(escape(atob("${encoded}")))))}catch(e){}<\/script></body>`);
  const name = (s.projName||'bidscore').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSaveHTML(`BidScore_${name}.html`, injected);
}
async function saveJSON() {
  const s = collectState();
  try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch {}
  const name = (s.projName||'bidscore').replace(/[^a-zA-Z0-9_-]/g,'_');
  await nativeSaveText(`bidscore_${name}.json`, JSON.stringify(s, null, 2), 'JSON Files', '.json');
}
async function loadJSON(input) {
  const file = input.files[0]; if (!file) return;
  try { applyState(JSON.parse(await file.text())); _snapshot(); } catch { alert('Invalid JSON file'); }
  input.value = '';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══ Tool nav popover ════════════════════════════════════════════════ */
const SUITE_TOOLS = [
  { name:'TimeCast',    file:'timecast.html',    color:'#2c4e87', abbr:'TC', tag:'Gantt timeline'     },
  { name:'ResourceCast',file:'resourcecast.html',color:'#0891b2', abbr:'RC', tag:'Resource planning'  },
  { name:'OrgCast',     file:'orgcast.html',     color:'#7c3aed', abbr:'OC', tag:'Org chart'           },
  { name:'RFQCast',     file:'rfqcast.html',     color:'#d97706', abbr:'RQ', tag:'Supplier quotes'     },
  { name:'DORCast',     file:'dorcast.html',     color:'#059669', abbr:'DC', tag:'RACI matrix'         },
  { name:'RiskCast',    file:'riskcast.html',    color:'#dc2626', abbr:'RK', tag:'Risk register'       },
  { name:'CalcCast',    file:'calccast.html',    color:'#0369a1', abbr:'CC', tag:'Cost calculator'     },
  { name:'LetterCast',  file:'lettercast.html',  color:'#6366f1', abbr:'LC', tag:'Cover letters'       },
  { name:'CashFlow',    file:'cashflow.html',    color:'#0ea5e9', abbr:'CF', tag:'Cash flow'           },
  { name:'W2W Report',  file:'w2w-report.html',  color:'#10b981', abbr:'W2', tag:'Financial report'    },
  { name:'CVCast',      file:'cvcast.html',      color:'#b45309', abbr:'CV', tag:'CV builder'          },
  { name:'ForeCast',    file:'forecast.html',    color:'#8b5cf6', abbr:'FC', tag:'Pipeline monitor'    },
  { name:'BidScore',    file:'bidscore.html',    color:'#1e3a6b', abbr:'BS', tag:'Bid/No-Bid scoring'  },
  { name:'ActionLog',   file:'actionlog.html',   color:'#ef4444', abbr:'AL', tag:'Action tracker'      },
  { name:'BidPack',     file:'bidpack.html',     color:'#334155', abbr:'BP', tag:'Bid assembler'       },
];

let _navOpen = false;

function _buildNavPopover() {
  const grid = document.getElementById('nav-pop-grid');
  if (!grid || grid.children.length) return;
  const current = location.pathname.split('/').pop() || 'index.html';
  grid.innerHTML = SUITE_TOOLS.map(t => {
    const active = t.file === current ? ' ntc-active' : '';
    return `<a class="nav-tool-card${active}" href="${t.file}">
      <div class="ntc-icon" style="background:${t.color}">${t.abbr}</div>
      <div class="ntc-info">
        <div class="ntc-name">${t.name}</div>
        <div class="ntc-tag">${t.tag}</div>
      </div>
    </a>`;
  }).join('');
}

function toggleNavPopover(e) {
  e && e.stopPropagation();
  _navOpen ? closeNavPopover() : openNavPopover();
}

function openNavPopover() {
  _buildNavPopover();
  const pop = document.getElementById('nav-popover');
  const btn = document.getElementById('dashboard-btn');
  pop.style.display = 'block';
  btn.classList.add('open');
  _navOpen = true;
}

function closeNavPopover() {
  const pop = document.getElementById('nav-popover');
  const btn = document.getElementById('dashboard-btn');
  pop.style.display = 'none';
  btn.classList.remove('open');
  _navOpen = false;
}

/* ── Dark mode ── */
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('bidcast_theme', newTheme);
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = newTheme === 'dark' ? '☀' : '🌙';
  try {
    const sync = JSON.parse(localStorage.getItem('bidcast_suite_sync') || '{}');
    sync.theme = newTheme; sync._ts = Date.now();
    localStorage.setItem('bidcast_suite_sync', JSON.stringify(sync));
  } catch(e) {}
}
function _applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme || 'light');
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀' : '🌙';
}

function _suiteWrite() {
  const n = document.getElementById('proj-name')?.value || '';
  if (n) SuiteManager.write({ projectName: n }, 'bidscore');
}

/* ══ Init ═════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  SuiteManager.migrate();
  _applyTheme(localStorage.getItem('bidcast_theme') || 'light');

  const saved = localStorage.getItem(STATE_KEY);
  if (saved) {
    try { applyState(JSON.parse(saved)); }
    catch { DEFAULT_CRITERIA.forEach(c => addCriterion(c)); }
  } else {
    DEFAULT_CRITERIA.forEach(c => addCriterion(c));
    const sync = SuiteManager.read();
    if (sync.projectName) document.getElementById('proj-name').value = sync.projectName;
    document.getElementById('bid-date').value = new Date().toISOString().slice(0, 10);
  }

  _snapshot();

  SuiteManager.onUpdate(sync => {
    const el = document.getElementById('proj-name');
    if (el && document.activeElement !== el && sync.projectName) el.value = sync.projectName;
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeNavPopover(); return; }
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      if (e.key === 'y' || (e.key==='z' && e.shiftKey)) { e.preventDefault(); redo(); }
      if (e.key === 's') { e.preventDefault(); saveJSON(); }
    }
  });

  document.addEventListener('click', () => { if (_navOpen) closeNavPopover(); });
});
</script>
</body>
</html>
