<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#1e3a5f"/>
  <!-- Top-left square -->
  <rect x="4"  y="4"  width="11" height="11" rx="2" fill="white"/>
  <!-- Top-right square -->
  <rect x="17" y="4"  width="11" height="11" rx="2" fill="white"/>
  <!-- Bottom-left square -->
  <rect x="4"  y="17" width="11" height="11" rx="2" fill="white"/>
  <!-- Bottom-right square (faded) -->
  <rect x="17" y="17" width="11" height="11" rx="2" fill="white" opacity="0.4"/>
</svg>
